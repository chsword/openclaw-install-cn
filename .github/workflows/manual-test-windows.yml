name: Manual Test – Windows CLI pnpm install smoke test

# Manually triggered workflow that validates the current CLI model on Windows:
# environment detection, manifest lookup, and pnpm-based install/upgrade.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

jobs:
  test-windows-cli-pnpm:
    name: Windows CLI – pnpm install smoke test
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install CLI dependencies
        run: npm ci
        working-directory: cli

      - name: Build Windows CLI binary
        run: npm run build:win
        working-directory: cli

      - name: Install built CLI binary
        shell: pwsh
        env:
          OCLAW_BIN_DIR: ${{ runner.temp }}\oclaw-bin
        run: |
          New-Item -ItemType Directory -Path $env:OCLAW_BIN_DIR -Force | Out-Null
          Copy-Item -Path 'cli\dist\oclaw-win-x64.exe' -Destination (Join-Path $env:OCLAW_BIN_DIR 'oclaw.exe') -Force
          & (Join-Path $env:OCLAW_BIN_DIR 'oclaw.exe') --version

      - name: Install pnpm
        shell: pwsh
        run: npm install -g pnpm

      - name: Check status before install
        shell: pwsh
        env:
          OCLAW_BIN_DIR: ${{ runner.temp }}\oclaw-bin
        run: |
          & (Join-Path $env:OCLAW_BIN_DIR 'oclaw.exe') status --check-updates --json

      - name: Install OpenClaw via pnpm
        id: oclaw_install
        shell: pwsh
        env:
          OCLAW_BIN_DIR: ${{ runner.temp }}\oclaw-bin
        run: |
          & (Join-Path $env:OCLAW_BIN_DIR 'oclaw.exe') install

      - name: Verify status after install
        id: status_initial
        shell: pwsh
        env:
          OCLAW_BIN_DIR: ${{ runner.temp }}\oclaw-bin
        run: |
          $statusJson = (& (Join-Path $env:OCLAW_BIN_DIR 'oclaw.exe') status --json) | Out-String
          Write-Host $statusJson
          $status = $statusJson | ConvertFrom-Json
          if (-not $status.installed) { Write-Error 'OpenClaw not installed'; exit 1 }
          if (-not $status.installedVersion) { Write-Error 'installedVersion is empty'; exit 1 }
          "installed_version=$($status.installedVersion)" >> $env:GITHUB_OUTPUT

      - name: Upgrade OpenClaw via pnpm
        id: oclaw_upgrade
        shell: pwsh
        env:
          OCLAW_BIN_DIR: ${{ runner.temp }}\oclaw-bin
        run: |
          & (Join-Path $env:OCLAW_BIN_DIR 'oclaw.exe') upgrade

      - name: Verify status after upgrade
        shell: pwsh
        env:
          OCLAW_BIN_DIR: ${{ runner.temp }}\oclaw-bin
        run: |
          $statusJson = (& (Join-Path $env:OCLAW_BIN_DIR 'oclaw.exe') status --json) | Out-String
          Write-Host $statusJson
          $status = $statusJson | ConvertFrom-Json
          if (-not $status.installed) { Write-Error 'OpenClaw not installed after upgrade'; exit 1 }
          if (-not $status.installedVersion) { Write-Error 'installedVersion is empty after upgrade'; exit 1 }

      - name: Upload installation log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: manual-test-windows-install-log
          path: |
            ${{ runner.temp }}\oclaw-install-*.log
          retention-days: 7
          if-no-files-found: ignore
