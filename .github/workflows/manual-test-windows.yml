name: Manual Test – Windows CLI (offline install & upgrade)

# Manually triggered workflow that validates the Windows bootstrap installer
# (scripts/install.ps1) and the oclaw CLI in offline / air-gap mode.
#
# What is tested:
#   1. Build the oclaw CLI binary from source (oclaw-win-x64.exe).
#   2. Assemble a local offline bundle that mirrors the CDN structure.
#   3. Run install.ps1 -LocalBundle <bundle> with an unreachable CDN base URL
#      to prove that NO external network access is required.
#   4. Verify oclaw.exe is installed and `oclaw --version` returns the expected
#      CLI version.
#   5. Verify `oclaw status` shows the mock OpenClaw app as installed at the
#      correct version.
#   6. Verify the mock openclaw command is present in the install directory.
#   7. Simulate an upgrade by running `oclaw install --local-package <new-bundle>`
#      with a newer mock OpenClaw version.
#   8. Verify `oclaw status` reflects the upgraded version.
#   9. Verify the upgraded mock openclaw command reports the new version.
#
# Offline guarantee:
#   -CdnBase 'http://oclaw-unreachable.invalid' is passed to install.ps1, and
#   OCLAW_CDN=http://oclaw-unreachable.invalid is set for every oclaw CLI call.
#   Any accidental CDN request would immediately fail with a DNS error, causing
#   the workflow step to fail.

on:
  workflow_dispatch:
    inputs:
      openclaw_initial_version:
        description: 'Initial mock OpenClaw app version to install (e.g. 2026.3.8) – must be a date-based OpenClaw version, NOT the CLI version'
        required: false
        default: '2026.3.8'
      openclaw_upgrade_version:
        description: 'Upgraded mock OpenClaw app version (e.g. 2026.3.9) – must be a date-based OpenClaw version, NOT the CLI version'
        required: false
        default: '2026.3.9'

jobs:
  # ── Windows offline install & upgrade end-to-end test ─────────────────────
  test-windows-cli-offline:
    name: Windows CLI – offline install & upgrade
    runs-on: windows-latest
    permissions:
      contents: read

    env:
      # Point every oclaw CLI call at an unreachable address so accidental CDN
      # requests fail immediately rather than hanging.
      OCLAW_CDN: http://oclaw-unreachable.invalid

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: cli/node_modules
          key: ${{ runner.os }}-node20-cli-node-modules-${{ hashFiles('cli/package-lock.json') }}

      - name: Install CLI dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: cli

      # ── 3. Build Windows CLI binary ─────────────────────────────────────────
      - name: Build Windows CLI binary
        run: npm run build:win
        working-directory: cli

      - name: Smoke-test built binary
        shell: pwsh
        run: |
          $ver = & .\cli\dist\oclaw-win-x64.exe --version 2>&1
          Write-Host "Built oclaw version: $ver"
          if (-not $ver) {
            Write-Error "Binary did not return a version"
            exit 1
          }

      # ── 4. Read CLI version from package.json ────────────────────────────────
      - name: Read CLI version
        id: cli_ver
        shell: pwsh
        run: |
          $v = (Get-Content cli/package.json -Raw | ConvertFrom-Json).version
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "CLI version: $v"

      # ── 5. Create offline bundles ────────────────────────────────────────────
      # Two bundles are created:
      #   $RUNNER_TEMP\oclaw-test-bundle         – initial install  (APP_INITIAL)
      #   $RUNNER_TEMP\oclaw-upgrade-bundle      – upgrade install  (APP_UPGRADE)
      #
      # Each bundle mirrors the CDN directory layout expected by install.ps1 and
      # `oclaw install --local-package`:
      #
      #   {bundle}/
      #     cli-manifest.json                       ← CLI version index (for install.ps1)
      #     cli/{cliVer}/oclaw-{cliVer}-win32-x64.zip   ← CLI binary (oclaw.exe inside)
      #     manifest.json                           ← OpenClaw app version index
      #     pkg/{appVer}/openclaw-{appVer}-win32-x64.zip ← Mock openclaw app (openclaw.cmd)
      - name: Create offline bundles
        id: bundles
        shell: pwsh
        env:
          CLI_VERSION:     ${{ steps.cli_ver.outputs.version }}
          APP_INITIAL:     ${{ inputs.openclaw_initial_version }}
          APP_UPGRADE:     ${{ inputs.openclaw_upgrade_version }}
        run: |
          $cliVer     = $env:CLI_VERSION
          $appInitial = $env:APP_INITIAL
          $appUpgrade = $env:APP_UPGRADE

          # ── Helper: create one complete offline bundle ──────────────────────
          function New-OfflineBundle {
            param(
              [string]$BundleDir,
              [string]$AppVersion
            )

            Write-Host ""
            Write-Host "=== Creating bundle: $BundleDir (OpenClaw $AppVersion) ==="
            New-Item -ItemType Directory -Path $BundleDir -Force | Out-Null

            # ── (a) CLI manifest ──────────────────────────────────────────────
            $cliManifest = [ordered]@{
              latest   = $cliVer
              versions = @(
                [ordered]@{
                  version  = $cliVer
                  files    = [ordered]@{ 'win32-x64' = "oclaw-${cliVer}-win32-x64.zip" }
                }
              )
            } | ConvertTo-Json -Depth 5
            Set-Content -Path (Join-Path $BundleDir 'cli-manifest.json') `
                        -Value $cliManifest -Encoding UTF8
            Write-Host "  [cli-manifest.json] written"

            # ── (b) CLI binary zip ────────────────────────────────────────────
            # install.ps1 searches for 'oclaw.exe' inside the extracted archive,
            # so the zip entry must be named 'oclaw.exe'.
            $cliPkgDir = Join-Path $BundleDir "cli\$cliVer"
            New-Item -ItemType Directory -Path $cliPkgDir -Force | Out-Null

            # Rename the built binary to oclaw.exe in a temp location
            $tmpExeDir = Join-Path $env:TEMP "oclaw-pkg-tmp"
            New-Item -ItemType Directory -Path $tmpExeDir -Force | Out-Null
            $tmpExe = Join-Path $tmpExeDir 'oclaw.exe'
            Copy-Item -Path 'cli\dist\oclaw-win-x64.exe' -Destination $tmpExe -Force

            $cliZip = Join-Path $cliPkgDir "oclaw-${cliVer}-win32-x64.zip"
            Compress-Archive -LiteralPath $tmpExe -DestinationPath $cliZip -Force
            Remove-Item -Path $tmpExeDir -Recurse -Force
            Write-Host "  [cli/$cliVer/oclaw-$cliVer-win32-x64.zip] written ($($(Get-Item $cliZip).Length) bytes)"

            # ── (c) OpenClaw app manifest ──────────────────────────────────────
            $appManifest = [ordered]@{
              latest   = $AppVersion
              versions = @(
                [ordered]@{
                  version     = $AppVersion
                  releaseDate = (Get-Date -Format 'yyyy-MM-dd')
                  description = "Mock OpenClaw $AppVersion (offline test)"
                  files       = [ordered]@{ 'win32-x64' = "openclaw-${AppVersion}-win32-x64.zip" }
                }
              )
            } | ConvertTo-Json -Depth 5
            Set-Content -Path (Join-Path $BundleDir 'manifest.json') `
                        -Value $appManifest -Encoding UTF8
            Write-Host "  [manifest.json] written"

            # ── (d) Mock OpenClaw app zip ─────────────────────────────────────
            # Create a tiny openclaw.cmd batch script that echoes its version.
            # After `oclaw install`, this file lands in $InstallDir so the test
            # can verify the correct version is reported.
            $appPkgDir = Join-Path $BundleDir "pkg\$AppVersion"
            New-Item -ItemType Directory -Path $appPkgDir -Force | Out-Null

            $tmpAppDir = Join-Path $env:TEMP "mock-openclaw-$AppVersion"
            New-Item -ItemType Directory -Path $tmpAppDir -Force | Out-Null
            $cmdFile = Join-Path $tmpAppDir 'openclaw.cmd'
            # A minimal batch file that prints the version on stdout.
            Set-Content -Path $cmdFile -Value "@echo off`r`necho OpenClaw $AppVersion`r`n" -Encoding ASCII

            $appZip = Join-Path $appPkgDir "openclaw-${AppVersion}-win32-x64.zip"
            Compress-Archive -LiteralPath $cmdFile -DestinationPath $appZip -Force
            Remove-Item -Path $tmpAppDir -Recurse -Force
            Write-Host "  [pkg/$AppVersion/openclaw-$AppVersion-win32-x64.zip] written"

            Write-Host "Bundle layout:"
            Get-ChildItem -Path $BundleDir -Recurse |
              ForEach-Object { Write-Host "  $($_.FullName.Replace($BundleDir,'.'))" }
          }

          # ── Create both bundles ───────────────────────────────────────────────
          $initialBundle = Join-Path $env:RUNNER_TEMP 'oclaw-test-bundle'
          $upgradeBundle = Join-Path $env:RUNNER_TEMP 'oclaw-upgrade-bundle'

          New-OfflineBundle -BundleDir $initialBundle -AppVersion $appInitial
          New-OfflineBundle -BundleDir $upgradeBundle -AppVersion $appUpgrade

          "initial_bundle=$initialBundle" >> $env:GITHUB_OUTPUT
          "upgrade_bundle=$upgradeBundle"  >> $env:GITHUB_OUTPUT

      # ── 6. Run install.ps1 with local bundle (offline) ──────────────────────
      # -CdnBase points to an unreachable address to prove no CDN calls are made.
      - name: Run install.ps1 (offline – local bundle)
        shell: pwsh
        env:
          INSTALL_DIR:    ${{ runner.temp }}\openclaw-app
          INITIAL_BUNDLE: ${{ steps.bundles.outputs.initial_bundle }}
        run: |
          Write-Host "Running install.ps1 with local bundle: $env:INITIAL_BUNDLE"
          Write-Host "Install dir: $env:INSTALL_DIR"
          Write-Host "CDN base: http://oclaw-unreachable.invalid (should never be reached)"

          # Run install.ps1 as a script block (same as the documented irm | iex pattern).
          # Pass -CdnBase to an unreachable URL; any accidental CDN call will fail with
          # an immediate DNS error, surfacing the problem rather than hanging.
          & ([scriptblock]::Create((Get-Content 'scripts\install.ps1' -Raw))) `
            -LocalBundle    $env:INITIAL_BUNDLE `
            -InstallDir     $env:INSTALL_DIR `
            -CdnBase        'http://oclaw-unreachable.invalid'

          if ($LASTEXITCODE -and $LASTEXITCODE -ne 0) {
            Write-Error "install.ps1 exited with code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          Write-Host "install.ps1 completed successfully"

      # ── 7. Verify oclaw CLI is installed and version is correct ──────────────
      - name: Verify oclaw CLI version
        shell: pwsh
        env:
          EXPECTED_CLI_VERSION: ${{ steps.cli_ver.outputs.version }}
        run: |
          $oclawBin = Join-Path $env:LOCALAPPDATA 'oclaw\bin\oclaw.exe'

          if (-not (Test-Path $oclawBin)) {
            Write-Error "oclaw.exe not found at expected location: $oclawBin"
            exit 1
          }
          Write-Host "oclaw.exe found at: $oclawBin"

          $ver = & $oclawBin --version 2>&1
          Write-Host "oclaw --version output: $ver"

          if (-not $ver) {
            Write-Error "oclaw --version returned no output"
            exit 1
          }
          if ($ver -ne $env:EXPECTED_CLI_VERSION) {
            Write-Error "Expected CLI version $($env:EXPECTED_CLI_VERSION) but got: $ver"
            exit 1
          }
          Write-Host "✔ oclaw CLI version is correct: $ver"

      # ── 8. Verify oclaw status shows the installed OpenClaw app version ───────
      # SUCCESS CRITERION: installedVersion must be the OpenClaw APP version
      # (e.g. '2026.3.8'), NOT the oclaw CLI version (e.g. '1.0.3').
      # Using the CLI version as a success criterion would be INCORRECT.
      - name: Verify oclaw status (initial install)
        shell: pwsh
        env:
          INSTALL_DIR:          ${{ runner.temp }}\openclaw-app
          EXPECTED_APP_VERSION: ${{ inputs.openclaw_initial_version }}
          CLI_VERSION:          ${{ steps.cli_ver.outputs.version }}
        run: |
          $oclawBin = Join-Path $env:LOCALAPPDATA 'oclaw\bin\oclaw.exe'

          # Use --json for reliable machine-readable parsing.
          # Capture only stdout so stderr errors don't break ConvertFrom-Json.
          $statusJson = (& $oclawBin status --json) | Out-String
          Write-Host "oclaw status --json output:"
          Write-Host $statusJson

          $status = $statusJson | ConvertFrom-Json

          if (-not $status.installed) {
            Write-Error "oclaw status reports OpenClaw is NOT installed!"
            exit 1
          }

          # ── Correct success criterion: OpenClaw APP version ──────────────────
          # installedVersion must match the expected OpenClaw app version.
          if ($status.installedVersion -ne $env:EXPECTED_APP_VERSION) {
            Write-Error "Expected installed version $($env:EXPECTED_APP_VERSION) but got: $($status.installedVersion)"
            exit 1
          }
          Write-Host "  ✔ CORRECT: installedVersion = '$($status.installedVersion)' (OpenClaw app version)"

          # ── Guard against incorrect success criterion: CLI version ────────────
          # If installedVersion equals the CLI version, the install wrote the
          # wrong version marker – this would be a bug, not success.
          if ($status.installedVersion -eq $env:CLI_VERSION) {
            Write-Error "INCORRECT: installedVersion '$($status.installedVersion)' matches the CLI version – success must be based on the OpenClaw app version, not the CLI version"
            exit 1
          }
          Write-Host "  ✔ CORRECT: installedVersion '$($status.installedVersion)' is distinct from CLI version '$($env:CLI_VERSION)'"
          Write-Host "  ✔ OpenClaw $($status.installedVersion) is installed at $($status.installDir)"

      # ── 9. Verify mock openclaw command exists in install dir ─────────────────
      - name: Verify openclaw command in install directory
        shell: pwsh
        env:
          INSTALL_DIR:          ${{ runner.temp }}\openclaw-app
          EXPECTED_APP_VERSION: ${{ inputs.openclaw_initial_version }}
        run: |
          $oclawCmd = Join-Path $env:INSTALL_DIR 'openclaw.cmd'

          if (-not (Test-Path $oclawCmd)) {
            Write-Error "openclaw.cmd not found in install dir: $env:INSTALL_DIR"
            Write-Host "Contents of install dir:"
            Get-ChildItem $env:INSTALL_DIR -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host "  $($_.Name)" }
            exit 1
          }

          # Run the mock openclaw command and capture output.
          $output = (cmd /c "`"$oclawCmd`"" 2>&1).Trim()
          Write-Host "openclaw command output: $output"

          if ($output -notmatch [regex]::Escape($env:EXPECTED_APP_VERSION)) {
            Write-Error "Expected version $($env:EXPECTED_APP_VERSION) in openclaw output but got: $output"
            exit 1
          }
          Write-Host "✔ openclaw command is available and reports correct version: $output"

      # ── 10. Simulate upgrade: install newer version via local bundle ───────────
      - name: Install upgraded OpenClaw version (offline, local bundle)
        shell: pwsh
        env:
          INSTALL_DIR:     ${{ runner.temp }}\openclaw-app
          UPGRADE_BUNDLE:  ${{ steps.bundles.outputs.upgrade_bundle }}
          UPGRADE_VERSION: ${{ inputs.openclaw_upgrade_version }}
        run: |
          $oclawBin = Join-Path $env:LOCALAPPDATA 'oclaw\bin\oclaw.exe'

          Write-Host "Upgrading OpenClaw to $($env:UPGRADE_VERSION) from local bundle: $env:UPGRADE_BUNDLE"

          & $oclawBin install `
            --local-package $env:UPGRADE_BUNDLE `
            --dir           $env:INSTALL_DIR

          if ($LASTEXITCODE -ne 0) {
            Write-Error "oclaw install (upgrade) failed with exit code $LASTEXITCODE"
            exit 1
          }
          Write-Host "✔ Upgrade command completed successfully"

      # ── 11. Verify version after upgrade ────────────────────────────────────
      # SUCCESS CRITERION: installedVersion must reflect the new OpenClaw APP
      # version after upgrade, NOT the CLI version.
      - name: Verify oclaw status (after upgrade)
        shell: pwsh
        env:
          INSTALL_DIR:          ${{ runner.temp }}\openclaw-app
          EXPECTED_APP_VERSION: ${{ inputs.openclaw_upgrade_version }}
          CLI_VERSION:          ${{ steps.cli_ver.outputs.version }}
        run: |
          $oclawBin = Join-Path $env:LOCALAPPDATA 'oclaw\bin\oclaw.exe'

          $statusJson = (& $oclawBin status --json) | Out-String
          Write-Host "oclaw status --json output (after upgrade):"
          Write-Host $statusJson

          $status = $statusJson | ConvertFrom-Json

          if (-not $status.installed) {
            Write-Error "oclaw status reports OpenClaw is NOT installed after upgrade!"
            exit 1
          }

          # ── Correct success criterion: OpenClaw APP version ──────────────────
          if ($status.installedVersion -ne $env:EXPECTED_APP_VERSION) {
            Write-Error "Expected upgraded version $($env:EXPECTED_APP_VERSION) but got: $($status.installedVersion)"
            exit 1
          }
          Write-Host "  ✔ CORRECT: installedVersion = '$($status.installedVersion)' (OpenClaw app version after upgrade)"

          # ── Guard against incorrect success criterion: CLI version ────────────
          if ($status.installedVersion -eq $env:CLI_VERSION) {
            Write-Error "INCORRECT: installedVersion '$($status.installedVersion)' matches the CLI version – success must be based on the OpenClaw app version, not the CLI version"
            exit 1
          }
          Write-Host "  ✔ CORRECT: installedVersion '$($status.installedVersion)' is distinct from CLI version '$($env:CLI_VERSION)'"
          Write-Host "  ✔ OpenClaw successfully upgraded to $($status.installedVersion)"

      # ── 12. Verify openclaw command reports upgraded version ─────────────────
      - name: Verify openclaw command after upgrade
        shell: pwsh
        env:
          INSTALL_DIR:          ${{ runner.temp }}\openclaw-app
          EXPECTED_APP_VERSION: ${{ inputs.openclaw_upgrade_version }}
        run: |
          $oclawCmd = Join-Path $env:INSTALL_DIR 'openclaw.cmd'

          if (-not (Test-Path $oclawCmd)) {
            Write-Error "openclaw.cmd not found in install dir after upgrade: $env:INSTALL_DIR"
            exit 1
          }

          $output = (cmd /c "`"$oclawCmd`"" 2>&1).Trim()
          Write-Host "openclaw command output after upgrade: $output"

          if ($output -notmatch [regex]::Escape($env:EXPECTED_APP_VERSION)) {
            Write-Error "Expected version $($env:EXPECTED_APP_VERSION) after upgrade but got: $output"
            exit 1
          }
          Write-Host "✔ openclaw command reports upgraded version: $output"

      # ── 13. Print final summary ─────────────────────────────────────────────
      - name: Print test summary
        if: success()
        shell: pwsh
        env:
          CLI_VERSION:          ${{ steps.cli_ver.outputs.version }}
          APP_INITIAL_VERSION:  ${{ inputs.openclaw_initial_version }}
          APP_UPGRADE_VERSION:  ${{ inputs.openclaw_upgrade_version }}
        run: |
          Write-Host ""
          Write-Host "  ╔══════════════════════════════════════════════════╗" -ForegroundColor Green
          Write-Host "  ║  All offline Windows CLI tests passed!           ║" -ForegroundColor Green
          Write-Host "  ╚══════════════════════════════════════════════════╝" -ForegroundColor Green
          Write-Host ""
          Write-Host "  SUCCESS CRITERION (OpenClaw app version):" -ForegroundColor Green
          Write-Host "    ✔ OpenClaw installed : $env:APP_INITIAL_VERSION  ← CORRECT (app version)" -ForegroundColor Green
          Write-Host "    ✔ OpenClaw upgraded  : $env:APP_UPGRADE_VERSION   ← CORRECT (app version)" -ForegroundColor Green
          Write-Host ""
          Write-Host "  oclaw CLI version  : $env:CLI_VERSION  (secondary – CLI binary check only)" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "  NOTE: '$env:APP_INITIAL_VERSION' is the correct success criterion." -ForegroundColor Yellow
          Write-Host "        '$env:CLI_VERSION' (CLI version) would be INCORRECT as a success criterion." -ForegroundColor Yellow
          Write-Host ""
          Write-Host "  Tests ran in fully offline mode (CdnBase = http://oclaw-unreachable.invalid)" -ForegroundColor Yellow

      # ── 14. Upload install log on failure ────────────────────────────────────
      - name: Upload installation log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: manual-test-install-log
          path: |
            ${{ runner.temp }}\openclaw-install-*.log
          retention-days: 7
          if-no-files-found: ignore
