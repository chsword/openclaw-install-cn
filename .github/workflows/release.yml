name: Release

# Triggered by:
#   1. Pushing a semver tag:  git tag v1.2.3 && git push origin v1.2.3
#   2. Workflow dispatch from ci.yml auto-tag job (works around GITHUB_TOKEN trigger limitation)
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  # ── 1. Run tests ────────────────────────────────────────────────────────────
  test:
    name: Test CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json
      - run: npm ci
        working-directory: cli
      - run: npm test
        working-directory: cli

  # ── 2. Build CLI binaries (all platforms cross-compiled on Linux) ──────────
  build-cli:
    name: Build CLI binaries
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18 (matches pkg targets)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install CLI dependencies
        run: npm ci
        working-directory: cli

      - name: Set version from tag
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Update CLI version in package.json
        run: |
          cd cli
          npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version
        continue-on-error: true   # non-fatal if version already matches

      - name: Build Windows binary (x64)
        run: npm run build:win
        working-directory: cli

      - name: Build macOS binary (x64)
        run: npm run build:mac-x64
        working-directory: cli

      - name: Build macOS binary (arm64)
        run: npm run build:mac-arm64
        working-directory: cli

      - name: Build Linux binary (x64)
        run: npm run build:linux
        working-directory: cli

      - name: List built binaries
        run: ls -lh cli/dist/

      - name: Upload CLI binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-binaries
          path: |
            cli/dist/oclaw-win-x64.exe
            cli/dist/oclaw-darwin-x64
            cli/dist/oclaw-darwin-arm64
            cli/dist/oclaw-linux-x64
          retention-days: 1

  # ── 3. Build Windows GUI ────────────────────────────────────────────────────
  build-gui-win:
    name: Build Windows GUI
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set version from tag
        id: ver
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update GUI version in package.json
        shell: bash
        run: |
          cd gui
          npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version
        continue-on-error: true

      - name: Generate placeholder icons
        run: node scripts/gen-icons.js

      - name: Install GUI dependencies
        run: npm install
        working-directory: gui

      - name: Build Windows GUI
        run: npm run build:win
        working-directory: gui
        env:
          # Prevent electron-builder from trying to publish automatically
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List GUI build output
        shell: bash
        run: ls -lh gui/dist/ || dir gui\dist

      - name: Upload Windows GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: gui-win
          path: |
            gui/dist/*.exe
            gui/dist/**/*.exe
          retention-days: 1

  # ── 4. Create GitHub Release ────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-cli, build-gui-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download CLI binaries
        uses: actions/download-artifact@v4
        with:
          name: cli-binaries
          path: artifacts/cli/

      - name: Download Windows GUI
        uses: actions/download-artifact@v4
        with:
          name: gui-win
          path: artifacts/gui/

      - name: Make CLI binaries executable
        run: chmod +x artifacts/cli/oclaw-darwin-x64 artifacts/cli/oclaw-darwin-arm64 artifacts/cli/oclaw-linux-x64 || true

      - name: Generate SHA-256 checksums
        run: |
          cd artifacts
          echo "# SHA-256 Checksums for openclaw-install-cn ${{ steps.ver.outputs.tag }}" > checksums.sha256
          echo "" >> checksums.sha256
          find cli/ gui/ -type f | sort | while read f; do
            sha256sum "$f" >> checksums.sha256
          done
          # Also checksum the scripts
          sha256sum ../scripts/install.sh | sed 's|../||' >> checksums.sha256
          sha256sum ../scripts/install.ps1 | sed 's|../||' >> checksums.sha256
          echo ""
          cat checksums.sha256

      - name: Update CDN manifest versions
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Update openclaw package manifest with new version
          python3 - <<'EOF'
          import json, sys, os

          version = os.environ.get('VERSION', '')
          if not version:
              print("No version set, skipping manifest update")
              sys.exit(0)

          manifest_path = 'cdn-template/manifest.json'
          with open(manifest_path, 'r') as f:
              manifest = json.load(f)

          # Add the new version entry if not already present
          versions = manifest.get('versions', [])
          if not any(v['version'] == version for v in versions):
              new_entry = {
                  "version": version,
                  "releaseDate": __import__('datetime').date.today().isoformat(),
                  "description": f"Release {version}",
                  "files": {
                      "win32-x64":    f"openclaw-{version}-win32-x64.zip",
                      "darwin-x64":   f"openclaw-{version}-darwin-x64.tar.gz",
                      "darwin-arm64": f"openclaw-{version}-darwin-arm64.tar.gz",
                      "linux-x64":    f"openclaw-{version}-linux-x64.tar.gz"
                  },
                  "checksums": {
                      "win32-x64":    "sha256:REPLACE_WITH_ACTUAL",
                      "darwin-x64":   "sha256:REPLACE_WITH_ACTUAL",
                      "darwin-arm64": "sha256:REPLACE_WITH_ACTUAL",
                      "linux-x64":    "sha256:REPLACE_WITH_ACTUAL"
                  }
              }
              versions.insert(0, new_entry)
              manifest['versions'] = versions
          manifest['latest'] = version
          with open(manifest_path, 'w') as f:
              json.dump(manifest, f, indent=2, ensure_ascii=False)
          print(f"Updated {manifest_path} with version {version}")

          # Update CLI manifest
          cli_manifest_path = 'cdn-template/cli-manifest.json'
          with open(cli_manifest_path, 'r') as f:
              cli_manifest = json.load(f)
          cli_versions = cli_manifest.get('versions', [])
          if not any(v['version'] == version for v in cli_versions):
              cli_entry = {
                  "version": version,
                  "releaseDate": __import__('datetime').date.today().isoformat(),
                  "files": {
                      "win32-x64":    f"oclaw-{version}-win32-x64.zip",
                      "darwin-x64":   f"oclaw-{version}-darwin-x64.tar.gz",
                      "darwin-arm64": f"oclaw-{version}-darwin-arm64.tar.gz",
                      "linux-x64":    f"oclaw-{version}-linux-x64.tar.gz"
                  }
              }
              cli_versions.insert(0, cli_entry)
              cli_manifest['versions'] = cli_versions
          cli_manifest['latest'] = version
          with open(cli_manifest_path, 'w') as f:
              json.dump(cli_manifest, f, indent=2, ensure_ascii=False)
          print(f"Updated {cli_manifest_path} with version {version}")
          EOF
        env:
          VERSION: ${{ steps.ver.outputs.version }}

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          cat > /tmp/release-notes.md << NOTES
          ## OpenClaw Installer ${TAG}

          本版本通过 GitHub Actions 自动构建，包含以下组件：

          ### 📦 CLI 工具 (`oclaw`)

          | 文件 | 平台 | 架构 |
          |------|------|------|
          | \`oclaw-win-x64.exe\` | Windows | x64 |
          | \`oclaw-darwin-x64\` | macOS | Intel x64 |
          | \`oclaw-darwin-arm64\` | macOS | Apple Silicon |
          | \`oclaw-linux-x64\` | Linux | x64 |

          **使用方式：**
          \`\`\`bash
          # 配置 CDN 地址
          oclaw config --cdn-url https://your-cdn.example.com
          # 安装 OpenClaw
          oclaw install
          # 检查和升级
          oclaw upgrade
          \`\`\`

          ### 🖥️ Windows GUI 安装程序

          | 文件 | 说明 |
          |------|------|
          | \`openclaw-gui-setup-${VERSION}-x64.exe\` | NSIS 安装向导（推荐）|
          | \`openclaw-gui-${VERSION}-win-x64.exe\` | 免安装便携版 |

          ### 🛠️ 引导脚本

          | 文件 | 说明 |
          |------|------|
          | \`install.sh\` | macOS / Linux 一键安装 |
          | \`install.ps1\` | Windows PowerShell 一键安装 |

          **macOS / Linux 使用方式：**
          \`\`\`bash
          OCLAW_CDN=https://your-cdn.example.com \\
            curl -fsSL https://your-cdn.example.com/install.sh | bash
          \`\`\`

          **Windows 使用方式：**
          \`\`\`powershell
          \$env:OCLAW_CDN = "https://your-cdn.example.com"
          irm https://your-cdn.example.com/install.ps1 | iex
          \`\`\`

          ### 📋 CDN 模板文件

          | 文件 | 说明 |
          |------|------|
          | \`manifest.json\` | OpenClaw 包版本清单模板 |
          | \`cli-manifest.json\` | oclaw CLI 版本清单模板 |

          ### 🔒 校验和

          见附件 \`checksums.sha256\`

          ---
          详细部署文档：[docs/deployment.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/deployment.md)
          NOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OpenClaw Installer ${{ steps.ver.outputs.tag }}"
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: false
          files: |
            artifacts/cli/oclaw-win-x64.exe
            artifacts/cli/oclaw-darwin-x64
            artifacts/cli/oclaw-darwin-arm64
            artifacts/cli/oclaw-linux-x64
            artifacts/gui/*.exe
            scripts/install.sh
            scripts/install.ps1
            cdn-template/manifest.json
            cdn-template/cli-manifest.json
            artifacts/checksums.sha256
