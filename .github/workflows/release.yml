name: Release

# Triggered by:
#   1. Pushing a semver tag:  git tag v1.2.3 && git push origin v1.2.3
#   2. Workflow dispatch from ci.yml auto-tag job (works around GITHUB_TOKEN trigger limitation)
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  # ── 1. Run tests ────────────────────────────────────────────────────────────
  test:
    name: Test CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json
      - name: Cache node_modules
        uses: actions/cache@v5
        id: cache-test-node-modules
        with:
          path: cli/node_modules
          key: ${{ runner.os }}-node20-cli-node-modules-${{ hashFiles('cli/package-lock.json') }}
      - run: npm ci
        if: steps.cache-test-node-modules.outputs.cache-hit != 'true'
        working-directory: cli
      - run: npm test
        working-directory: cli

  # ── 2. Build CLI binaries (all platforms cross-compiled on Linux) ──────────
  build-cli:
    name: Build CLI binaries
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 18 (matches pkg targets)
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v5
        id: cache-build-cli-node-modules
        with:
          path: cli/node_modules
          key: ${{ runner.os }}-node18-cli-node-modules-${{ hashFiles('cli/package-lock.json') }}

      - name: Install CLI dependencies
        if: steps.cache-build-cli-node-modules.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: cli

      - name: Set version from tag
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Update CLI version in package.json
        run: |
          cd cli
          npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version
        continue-on-error: true   # non-fatal if version already matches

      - name: Build Windows binary (x64)
        run: npm run build:win
        working-directory: cli

      - name: Build macOS binary (x64)
        run: npm run build:mac-x64
        working-directory: cli

      - name: Build macOS binary (arm64)
        run: npm run build:mac-arm64
        working-directory: cli

      - name: Build Linux binary (x64)
        run: npm run build:linux
        working-directory: cli

      - name: List built binaries
        run: ls -lh cli/dist/

      - name: Upload CLI binaries artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli-binaries
          path: |
            cli/dist/oclaw-win-x64.exe
            cli/dist/oclaw-darwin-x64
            cli/dist/oclaw-darwin-arm64
            cli/dist/oclaw-linux-x64
          retention-days: 1

  # ── 3. Build Windows GUI ────────────────────────────────────────────────────
  build-gui-win:
    name: Build Windows GUI
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Cache Electron
        uses: actions/cache@v5
        with:
          path: ~/AppData/Local/electron/Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('gui/package.json') }}

      - name: Cache GUI node_modules
        uses: actions/cache@v5
        id: cache-gui-win-node-modules
        with:
          path: gui/node_modules
          key: ${{ runner.os }}-node20-gui-node-modules-${{ hashFiles('gui/package.json') }}

      - name: Set version from tag
        id: ver
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update GUI version in package.json
        shell: bash
        run: |
          cd gui
          npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version
        continue-on-error: true

      - name: Generate placeholder icons
        run: node scripts/gen-icons.js

      - name: Install GUI dependencies
        if: steps.cache-gui-win-node-modules.outputs.cache-hit != 'true'
        run: npm install
        working-directory: gui

      - name: Build Windows GUI
        run: npm run build:win
        working-directory: gui
        env:
          # Prevent electron-builder from trying to publish automatically
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List GUI build output
        shell: bash
        run: ls -lh gui/dist/ || dir gui\dist

      - name: Upload Windows GUI artifact
        uses: actions/upload-artifact@v7
        with:
          name: gui-win
          path: |
            gui/dist/*.exe
            gui/dist/**/*.exe
          retention-days: 1

  # ── 4. Build macOS GUI ──────────────────────────────────────────────────────
  build-gui-mac:
    name: Build macOS GUI
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Cache Electron
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/electron
          key: ${{ runner.os }}-electron-${{ hashFiles('gui/package.json') }}

      - name: Cache GUI node_modules
        uses: actions/cache@v5
        id: cache-gui-mac-node-modules
        with:
          path: gui/node_modules
          key: ${{ runner.os }}-node20-gui-node-modules-${{ hashFiles('gui/package.json') }}

      - name: Set version from tag
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update GUI version in package.json
        run: |
          cd gui
          npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version
        continue-on-error: true

      - name: Generate placeholder icons
        run: node scripts/gen-icons.js

      - name: Install GUI dependencies
        if: steps.cache-gui-mac-node-modules.outputs.cache-hit != 'true'
        run: npm install
        working-directory: gui

      - name: Build macOS GUI (x64 + arm64)
        run: npm run build:mac
        working-directory: gui
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable code signing – no certificate available in CI
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: List GUI build output
        run: ls -lh gui/dist/

      - name: Upload macOS GUI artifact
        uses: actions/upload-artifact@v7
        with:
          name: gui-mac
          path: gui/dist/*.dmg
          retention-days: 1

  # ── 5. Build Linux GUI ──────────────────────────────────────────────────────
  build-gui-linux:
    name: Build Linux GUI
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Cache Electron
        uses: actions/cache@v5
        with:
          path: ~/.cache/electron
          key: ${{ runner.os }}-electron-${{ hashFiles('gui/package.json') }}

      - name: Cache GUI node_modules
        uses: actions/cache@v5
        id: cache-gui-linux-node-modules
        with:
          path: gui/node_modules
          key: ${{ runner.os }}-node20-gui-node-modules-${{ hashFiles('gui/package.json') }}

      - name: Set version from tag
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update GUI version in package.json
        run: |
          cd gui
          npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version
        continue-on-error: true

      - name: Generate placeholder icons
        run: node scripts/gen-icons.js

      - name: Install GUI dependencies
        if: steps.cache-gui-linux-node-modules.outputs.cache-hit != 'true'
        run: npm install
        working-directory: gui

      - name: Build Linux GUI (AppImage)
        run: npm run build:linux
        working-directory: gui
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List GUI build output
        run: ls -lh gui/dist/

      - name: Upload Linux GUI artifact
        uses: actions/upload-artifact@v7
        with:
          name: gui-linux
          path: gui/dist/*.AppImage
          retention-days: 1

  # ── 6. Create GitHub Release ────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-cli, build-gui-win, build-gui-mac, build-gui-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download CLI binaries
        uses: actions/download-artifact@v8
        with:
          name: cli-binaries
          path: artifacts/cli/

      - name: Download Windows GUI
        uses: actions/download-artifact@v8
        with:
          name: gui-win
          path: artifacts/gui/win/

      - name: Download macOS GUI
        uses: actions/download-artifact@v8
        with:
          name: gui-mac
          path: artifacts/gui/mac/

      - name: Download Linux GUI
        uses: actions/download-artifact@v8
        with:
          name: gui-linux
          path: artifacts/gui/linux/

      - name: Make CLI binaries executable
        run: chmod +x artifacts/cli/oclaw-darwin-x64 artifacts/cli/oclaw-darwin-arm64 artifacts/cli/oclaw-linux-x64 || true

      - name: Generate SHA-256 checksums
        run: |
          cd artifacts
          echo "# SHA-256 Checksums for openclaw-install-cn ${{ steps.ver.outputs.tag }}" > checksums.sha256
          echo "" >> checksums.sha256
          find cli/ gui/ -type f | sort | while read f; do
            sha256sum "$f" >> checksums.sha256
          done
          # Also checksum the scripts
          sha256sum ../scripts/install.sh | sed 's|../||' >> checksums.sha256
          sha256sum ../scripts/install.ps1 | sed 's|../||' >> checksums.sha256
          echo ""
          cat checksums.sha256

      - name: Package artifacts for CDN
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          mkdir -p cdn-packages

          # CLI packages
          (cd artifacts/cli && zip "$OLDPWD/cdn-packages/oclaw-${VERSION}-win32-x64.zip" oclaw-win-x64.exe)
          (cd artifacts/cli && tar -czf "$OLDPWD/cdn-packages/oclaw-${VERSION}-darwin-x64.tar.gz" oclaw-darwin-x64)
          (cd artifacts/cli && tar -czf "$OLDPWD/cdn-packages/oclaw-${VERSION}-darwin-arm64.tar.gz" oclaw-darwin-arm64)
          (cd artifacts/cli && tar -czf "$OLDPWD/cdn-packages/oclaw-${VERSION}-linux-x64.tar.gz" oclaw-linux-x64)

          # GUI packages - locate the actual built files and wrap them
          WIN_EXE=$(find artifacts/gui/win -name "*.exe" | sort | head -1)
          MAC_X64_DMG=$(find artifacts/gui/mac -name "*x64*.dmg" | sort | head -1)
          MAC_ARM64_DMG=$(find artifacts/gui/mac -name "*arm64*.dmg" | sort | head -1)
          LINUX_APPIMAGE=$(find artifacts/gui/linux -name "*.AppImage" | sort | head -1)

          if [ -n "$WIN_EXE" ]; then
            (cd "$(dirname "$WIN_EXE")"       && zip     "$OLDPWD/cdn-packages/openclaw-${VERSION}-win32-x64.zip"        "$(basename "$WIN_EXE")")
          else
            echo "WARNING: No Windows GUI exe found – openclaw-${VERSION}-win32-x64.zip will be missing"
          fi
          if [ -n "$MAC_X64_DMG" ]; then
            (cd "$(dirname "$MAC_X64_DMG")"   && tar -czf "$OLDPWD/cdn-packages/openclaw-${VERSION}-darwin-x64.tar.gz"   "$(basename "$MAC_X64_DMG")")
          else
            echo "WARNING: No macOS x64 dmg found – openclaw-${VERSION}-darwin-x64.tar.gz will be missing"
          fi
          if [ -n "$MAC_ARM64_DMG" ]; then
            (cd "$(dirname "$MAC_ARM64_DMG")" && tar -czf "$OLDPWD/cdn-packages/openclaw-${VERSION}-darwin-arm64.tar.gz" "$(basename "$MAC_ARM64_DMG")")
          else
            echo "WARNING: No macOS arm64 dmg found – openclaw-${VERSION}-darwin-arm64.tar.gz will be missing"
          fi
          if [ -n "$LINUX_APPIMAGE" ]; then
            (cd "$(dirname "$LINUX_APPIMAGE")" && tar -czf "$OLDPWD/cdn-packages/openclaw-${VERSION}-linux-x64.tar.gz"   "$(basename "$LINUX_APPIMAGE")")
          else
            echo "WARNING: No Linux AppImage found – openclaw-${VERSION}-linux-x64.tar.gz will be missing"
          fi

          echo "CDN packages created:"
          ls -lh cdn-packages/ || echo "(no packages created)"

      - name: Update CDN manifest versions
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Update openclaw package manifest with new version and actual checksums
          python3 - <<'EOF'
          import json, sys, os, hashlib, glob as _glob

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, 'rb') as f:
                  for chunk in iter(lambda: f.read(65536), b''):
                      h.update(chunk)
              return h.hexdigest()

          def checksum_for(pattern):
              matches = _glob.glob(pattern)
              if not matches:
                  print(f"WARNING: No file found for pattern '{pattern}' – using placeholder")
                  return 'sha256:REPLACE_WITH_ACTUAL'
              if len(matches) > 1:
                  print(f"WARNING: Multiple files match '{pattern}': {matches} – using first match")
              return 'sha256:' + sha256_file(matches[0])

          version = os.environ.get('VERSION', '')
          if not version:
              print("No version set, skipping manifest update")
              sys.exit(0)

          cdn_dir = 'cdn-packages'

          # Compute checksums for CLI CDN packages
          cli_checksums = {
              'win32-x64':    checksum_for(f'{cdn_dir}/oclaw-{version}-win32-x64.zip'),
              'darwin-x64':   checksum_for(f'{cdn_dir}/oclaw-{version}-darwin-x64.tar.gz'),
              'darwin-arm64': checksum_for(f'{cdn_dir}/oclaw-{version}-darwin-arm64.tar.gz'),
              'linux-x64':    checksum_for(f'{cdn_dir}/oclaw-{version}-linux-x64.tar.gz'),
          }

          # Compute checksums for GUI (openclaw) CDN packages
          gui_checksums = {
              'win32-x64':    checksum_for(f'{cdn_dir}/openclaw-{version}-win32-x64.zip'),
              'darwin-x64':   checksum_for(f'{cdn_dir}/openclaw-{version}-darwin-x64.tar.gz'),
              'darwin-arm64': checksum_for(f'{cdn_dir}/openclaw-{version}-darwin-arm64.tar.gz'),
              'linux-x64':    checksum_for(f'{cdn_dir}/openclaw-{version}-linux-x64.tar.gz'),
          }

          print(f"CLI checksums: {cli_checksums}")
          print(f"GUI checksums: {gui_checksums}")

          manifest_path = 'cdn-template/manifest.json'
          with open(manifest_path, 'r') as f:
              manifest = json.load(f)

          # Add the new version entry if not already present
          versions = manifest.get('versions', [])
          if not any(v['version'] == version for v in versions):
              new_entry = {
                  "version": version,
                  "releaseDate": __import__('datetime').date.today().isoformat(),
                  "description": f"Release {version}",
                  "files": {
                      "win32-x64":    f"openclaw-{version}-win32-x64.zip",
                      "darwin-x64":   f"openclaw-{version}-darwin-x64.tar.gz",
                      "darwin-arm64": f"openclaw-{version}-darwin-arm64.tar.gz",
                      "linux-x64":    f"openclaw-{version}-linux-x64.tar.gz"
                  },
                  "checksums": gui_checksums
              }
              versions.insert(0, new_entry)
              manifest['versions'] = versions
          manifest['latest'] = version
          with open(manifest_path, 'w') as f:
              json.dump(manifest, f, indent=2, ensure_ascii=False)
          print(f"Updated {manifest_path} with version {version}")

          # Update CLI manifest
          cli_manifest_path = 'cdn-template/cli-manifest.json'
          with open(cli_manifest_path, 'r') as f:
              cli_manifest = json.load(f)
          cli_versions = cli_manifest.get('versions', [])
          if not any(v['version'] == version for v in cli_versions):
              cli_entry = {
                  "version": version,
                  "releaseDate": __import__('datetime').date.today().isoformat(),
                  "files": {
                      "win32-x64":    f"oclaw-{version}-win32-x64.zip",
                      "darwin-x64":   f"oclaw-{version}-darwin-x64.tar.gz",
                      "darwin-arm64": f"oclaw-{version}-darwin-arm64.tar.gz",
                      "linux-x64":    f"oclaw-{version}-linux-x64.tar.gz"
                  },
                  "checksums": cli_checksums
              }
              cli_versions.insert(0, cli_entry)
              cli_manifest['versions'] = cli_versions
          cli_manifest['latest'] = version
          with open(cli_manifest_path, 'w') as f:
              json.dump(cli_manifest, f, indent=2, ensure_ascii=False)
          print(f"Updated {cli_manifest_path} with version {version}")
          EOF
        env:
          VERSION: ${{ steps.ver.outputs.version }}

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          cat > /tmp/release-notes.md << NOTES
          ## OpenClaw Installer ${TAG}

          本版本通过 GitHub Actions 自动构建，包含以下组件：

          ### 📦 CLI 工具 (`oclaw`)

          | 文件 | 平台 | 架构 |
          |------|------|------|
          | \`oclaw-win-x64.exe\` | Windows | x64 |
          | \`oclaw-darwin-x64\` | macOS | Intel x64 |
          | \`oclaw-darwin-arm64\` | macOS | Apple Silicon |
          | \`oclaw-linux-x64\` | Linux | x64 |

          **使用方式：**
          \`\`\`bash
          # 安装 OpenClaw
          oclaw install
          # 检查和升级
          oclaw upgrade
          \`\`\`

          ### 🖥️ GUI 安装程序

          | 文件 | 平台 | 说明 |
          |------|------|------|
          | \`openclaw-gui-setup-${VERSION}-x64.exe\` | Windows | NSIS 安装向导（推荐）|
          | \`openclaw-gui-${VERSION}-win-x64.exe\` | Windows | 免安装便携版 |
          | \`openclaw-gui-${VERSION}-mac-x64.dmg\` | macOS | Intel x64 磁盘映像 |
          | \`openclaw-gui-${VERSION}-mac-arm64.dmg\` | macOS | Apple Silicon 磁盘映像 |
          | \`openclaw-gui-${VERSION}-linux-x64.AppImage\` | Linux | AppImage 便携版 |

          ### 🛠️ 引导脚本

          | 文件 | 说明 |
          |------|------|
          | \`install.sh\` | macOS / Linux 一键安装 |
          | \`install.ps1\` | Windows PowerShell 一键安装 |

          **macOS / Linux 使用方式：**
          \`\`\`bash
          curl -fsSL https://oclaw.chatu.plus/install.sh | bash
          \`\`\`

          **Windows 使用方式：**
          \`\`\`powershell
          irm https://oclaw.chatu.plus/install.ps1 | iex
          \`\`\`

          ### 📋 CDN 模板文件

          | 文件 | 说明 |
          |------|------|
          | \`manifest.json\` | OpenClaw 包版本清单模板 |
          | \`cli-manifest.json\` | oclaw CLI 版本清单模板 |

          ### 🔒 校验和

          见附件 \`checksums.sha256\`

          ---
          详细部署文档：[docs/deployment.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/deployment.md)
          NOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OpenClaw Installer ${{ steps.ver.outputs.tag }}"
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: false
          files: |
            artifacts/cli/oclaw-win-x64.exe
            artifacts/cli/oclaw-darwin-x64
            artifacts/cli/oclaw-darwin-arm64
            artifacts/cli/oclaw-linux-x64
            artifacts/gui/win/*.exe
            artifacts/gui/win/**/*.exe
            artifacts/gui/mac/*.dmg
            artifacts/gui/linux/*.AppImage
            scripts/install.sh
            scripts/install.ps1
            cdn-template/manifest.json
            cdn-template/cli-manifest.json
            artifacts/checksums.sha256

  # ── 7. Upload to Tencent COS (official CDN) ────────────────────────────────
  deploy-to-cos:
    name: Upload to Tencent COS
    needs: release
    runs-on: ubuntu-latest
    environment: TencentSecretId
    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download CLI binaries
        uses: actions/download-artifact@v8
        with:
          name: cli-binaries
          path: artifacts/cli/

      - name: Download Windows GUI
        uses: actions/download-artifact@v8
        with:
          name: gui-win
          path: artifacts/gui/win/

      - name: Download macOS GUI
        uses: actions/download-artifact@v8
        with:
          name: gui-mac
          path: artifacts/gui/mac/

      - name: Download Linux GUI
        uses: actions/download-artifact@v8
        with:
          name: gui-linux
          path: artifacts/gui/linux/

      - name: Make CLI binaries executable
        # chmod may fail on non-POSIX filesystems; non-unix binaries don't need +x anyway.
        run: chmod +x artifacts/cli/oclaw-darwin-x64 artifacts/cli/oclaw-darwin-arm64 artifacts/cli/oclaw-linux-x64 2>/dev/null || true

      - name: Package CLI and GUI archives for COS
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          mkdir -p cdn-packages

          # CLI packages
          (cd artifacts/cli && zip "$OLDPWD/cdn-packages/oclaw-${VERSION}-win32-x64.zip" oclaw-win-x64.exe)
          (cd artifacts/cli && tar -czf "$OLDPWD/cdn-packages/oclaw-${VERSION}-darwin-x64.tar.gz" oclaw-darwin-x64)
          (cd artifacts/cli && tar -czf "$OLDPWD/cdn-packages/oclaw-${VERSION}-darwin-arm64.tar.gz" oclaw-darwin-arm64)
          (cd artifacts/cli && tar -czf "$OLDPWD/cdn-packages/oclaw-${VERSION}-linux-x64.tar.gz" oclaw-linux-x64)

          # GUI packages
          WIN_EXE=$(find artifacts/gui/win -name "*.exe" | sort | head -1)
          MAC_X64_DMG=$(find artifacts/gui/mac -name "*x64*.dmg" | sort | head -1)
          MAC_ARM64_DMG=$(find artifacts/gui/mac -name "*arm64*.dmg" | sort | head -1)
          LINUX_APPIMAGE=$(find artifacts/gui/linux -name "*.AppImage" | sort | head -1)

          [ -n "$WIN_EXE" ]        && (cd "$(dirname "$WIN_EXE")"        && zip     "$OLDPWD/cdn-packages/openclaw-${VERSION}-win32-x64.zip"        "$(basename "$WIN_EXE")")        || true
          [ -n "$MAC_X64_DMG" ]    && (cd "$(dirname "$MAC_X64_DMG")"    && tar -czf "$OLDPWD/cdn-packages/openclaw-${VERSION}-darwin-x64.tar.gz"   "$(basename "$MAC_X64_DMG")")    || true
          [ -n "$MAC_ARM64_DMG" ]  && (cd "$(dirname "$MAC_ARM64_DMG")"  && tar -czf "$OLDPWD/cdn-packages/openclaw-${VERSION}-darwin-arm64.tar.gz" "$(basename "$MAC_ARM64_DMG")")  || true
          [ -n "$LINUX_APPIMAGE" ] && (cd "$(dirname "$LINUX_APPIMAGE")" && tar -czf "$OLDPWD/cdn-packages/openclaw-${VERSION}-linux-x64.tar.gz"    "$(basename "$LINUX_APPIMAGE")") || true

          echo "CDN packages:"
          ls -lh cdn-packages/

      - name: Update CDN manifests with checksums
        run: |
          python3 - <<'EOF'
          import json, sys, os, hashlib, glob as _glob

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, 'rb') as f:
                  for chunk in iter(lambda: f.read(65536), b''):
                      h.update(chunk)
              return h.hexdigest()

          def checksum_for(pattern, required=False):
              matches = _glob.glob(pattern)
              if not matches:
                  if required:
                      print(f"ERROR: Required file not found for pattern '{pattern}'", flush=True)
                      sys.exit(1)
                  print(f"WARNING: No file found for pattern '{pattern}' – using placeholder")
                  return 'sha256:REPLACE_WITH_ACTUAL'
              return 'sha256:' + sha256_file(matches[0])

          version = os.environ.get('VERSION', '')
          if not version:
              print("No version set, skipping manifest update")
              sys.exit(0)

          cdn_dir = 'cdn-packages'

          # CLI packages are required; GUI packages are optional.
          cli_checksums = {
              'win32-x64':    checksum_for(f'{cdn_dir}/oclaw-{version}-win32-x64.zip',    required=True),
              'darwin-x64':   checksum_for(f'{cdn_dir}/oclaw-{version}-darwin-x64.tar.gz',    required=True),
              'darwin-arm64': checksum_for(f'{cdn_dir}/oclaw-{version}-darwin-arm64.tar.gz', required=True),
              'linux-x64':    checksum_for(f'{cdn_dir}/oclaw-{version}-linux-x64.tar.gz',    required=True),
          }
          gui_checksums = {
              'win32-x64':    checksum_for(f'{cdn_dir}/openclaw-{version}-win32-x64.zip'),
              'darwin-x64':   checksum_for(f'{cdn_dir}/openclaw-{version}-darwin-x64.tar.gz'),
              'darwin-arm64': checksum_for(f'{cdn_dir}/openclaw-{version}-darwin-arm64.tar.gz'),
              'linux-x64':    checksum_for(f'{cdn_dir}/openclaw-{version}-linux-x64.tar.gz'),
          }

          manifest_path = 'cdn-template/manifest.json'
          with open(manifest_path, 'r') as f:
              manifest = json.load(f)
          versions = manifest.get('versions', [])
          if not any(v['version'] == version for v in versions):
              versions.insert(0, {
                  "version": version,
                  "releaseDate": __import__('datetime').date.today().isoformat(),
                  "description": f"Release {version}",
                  "files": {
                      "win32-x64":    f"openclaw-{version}-win32-x64.zip",
                      "darwin-x64":   f"openclaw-{version}-darwin-x64.tar.gz",
                      "darwin-arm64": f"openclaw-{version}-darwin-arm64.tar.gz",
                      "linux-x64":    f"openclaw-{version}-linux-x64.tar.gz"
                  },
                  "checksums": gui_checksums
              })
              manifest['versions'] = versions
          manifest['latest'] = version
          with open(manifest_path, 'w') as f:
              json.dump(manifest, f, indent=2, ensure_ascii=False)

          cli_manifest_path = 'cdn-template/cli-manifest.json'
          with open(cli_manifest_path, 'r') as f:
              cli_manifest = json.load(f)
          cli_versions = cli_manifest.get('versions', [])
          if not any(v['version'] == version for v in cli_versions):
              cli_versions.insert(0, {
                  "version": version,
                  "releaseDate": __import__('datetime').date.today().isoformat(),
                  "files": {
                      "win32-x64":    f"oclaw-{version}-win32-x64.zip",
                      "darwin-x64":   f"oclaw-{version}-darwin-x64.tar.gz",
                      "darwin-arm64": f"oclaw-{version}-darwin-arm64.tar.gz",
                      "linux-x64":    f"oclaw-{version}-linux-x64.tar.gz"
                  },
                  "checksums": cli_checksums
              })
              cli_manifest['versions'] = cli_versions
          cli_manifest['latest'] = version
          with open(cli_manifest_path, 'w') as f:
              json.dump(cli_manifest, f, indent=2, ensure_ascii=False)
          print(f"Manifests updated for version {version}")
          EOF
        env:
          VERSION: ${{ steps.ver.outputs.version }}

      - name: Install coscmd
        run: pip install coscmd

      - name: Configure coscmd
        run: |
          coscmd config \
            -a "${{ secrets.SECRETID }}" \
            -s "${{ secrets.SECRETKEY }}" \
            -b "${{ secrets.BUCKET }}" \
            -r "${{ secrets.REGION }}"

      - name: Upload packages to COS
        run: |
          VERSION="${{ steps.ver.outputs.version }}"

          # Upload CLI packages (required – job fails if any are missing)
          coscmd upload cdn-packages/oclaw-${VERSION}-win32-x64.zip    cli/${VERSION}/oclaw-${VERSION}-win32-x64.zip
          coscmd upload cdn-packages/oclaw-${VERSION}-darwin-x64.tar.gz    cli/${VERSION}/oclaw-${VERSION}-darwin-x64.tar.gz
          coscmd upload cdn-packages/oclaw-${VERSION}-darwin-arm64.tar.gz  cli/${VERSION}/oclaw-${VERSION}-darwin-arm64.tar.gz
          coscmd upload cdn-packages/oclaw-${VERSION}-linux-x64.tar.gz     cli/${VERSION}/oclaw-${VERSION}-linux-x64.tar.gz

          # Upload GUI packages (optional – skipped if the build artifact is absent)
          [ -f cdn-packages/openclaw-${VERSION}-win32-x64.zip ]        && coscmd upload cdn-packages/openclaw-${VERSION}-win32-x64.zip        ${VERSION}/openclaw-${VERSION}-win32-x64.zip        || true
          [ -f cdn-packages/openclaw-${VERSION}-darwin-x64.tar.gz ]    && coscmd upload cdn-packages/openclaw-${VERSION}-darwin-x64.tar.gz    ${VERSION}/openclaw-${VERSION}-darwin-x64.tar.gz    || true
          [ -f cdn-packages/openclaw-${VERSION}-darwin-arm64.tar.gz ]  && coscmd upload cdn-packages/openclaw-${VERSION}-darwin-arm64.tar.gz  ${VERSION}/openclaw-${VERSION}-darwin-arm64.tar.gz  || true
          [ -f cdn-packages/openclaw-${VERSION}-linux-x64.tar.gz ]     && coscmd upload cdn-packages/openclaw-${VERSION}-linux-x64.tar.gz     ${VERSION}/openclaw-${VERSION}-linux-x64.tar.gz     || true

          # Upload install scripts
          coscmd upload scripts/install.sh  install.sh
          coscmd upload scripts/install.ps1 install.ps1

          # Upload manifests (overwrite latest)
          coscmd upload cdn-template/manifest.json     manifest.json
          coscmd upload cdn-template/cli-manifest.json cli-manifest.json

      - name: Refresh CDN cache
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          CDN_DOMAIN: https://oclaw.chatu.plus
        run: |
          pip install tccli==3.1.48.1
          tccli configure set \
            secretId  "${{ secrets.SECRETID }}" \
            secretKey "${{ secrets.SECRETKEY }}" \
            region    "ap-guangzhou"

          # Build JSON array of URLs to purge.
          # Always purge overwritten files (manifests + install scripts) and
          # the versioned CLI packages uploaded in this release.
          URLS=$(python3 - <<'PYEOF'
          import json, os
          base = os.environ['CDN_DOMAIN']
          v    = os.environ['VERSION']
          print(json.dumps([
              base + '/manifest.json',
              base + '/cli-manifest.json',
              base + '/install.sh',
              base + '/install.ps1',
              base + '/cli/' + v + '/oclaw-' + v + '-win32-x64.zip',
              base + '/cli/' + v + '/oclaw-' + v + '-darwin-x64.tar.gz',
              base + '/cli/' + v + '/oclaw-' + v + '-darwin-arm64.tar.gz',
              base + '/cli/' + v + '/oclaw-' + v + '-linux-x64.tar.gz',
          ]))
          PYEOF
          )
          echo "Purging CDN URLs: $URLS"
          tccli cdn PurgeUrlsCache --Urls "$URLS"
          echo "CDN cache purge submitted successfully"
