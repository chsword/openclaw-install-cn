name: Release

# Triggered by:
#   1. Pushing a semver tag:  git tag v1.2.3 && git push origin v1.2.3
#   2. Workflow dispatch from ci.yml auto-tag job (works around GITHUB_TOKEN trigger limitation)
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  # ── 1. Run tests ────────────────────────────────────────────────────────────
  test:
    name: Test CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json
      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-test-node-modules
        with:
          path: cli/node_modules
          key: ${{ runner.os }}-node20-cli-node-modules-${{ hashFiles('cli/package-lock.json') }}
      - run: npm ci
        if: steps.cache-test-node-modules.outputs.cache-hit != 'true'
        working-directory: cli
      - run: npm test
        working-directory: cli

  # ── 2. Build CLI binaries (all platforms cross-compiled on Linux) ──────────
  build-cli:
    name: Build CLI binaries
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18 (matches pkg targets)
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-build-cli-node-modules
        with:
          path: cli/node_modules
          key: ${{ runner.os }}-node18-cli-node-modules-${{ hashFiles('cli/package-lock.json') }}

      - name: Install CLI dependencies
        if: steps.cache-build-cli-node-modules.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: cli

      - name: Set version from tag
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Update CLI version in package.json
        run: |
          cd cli
          npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version
        continue-on-error: true   # non-fatal if version already matches

      - name: Build Windows binary (x64)
        run: npm run build:win
        working-directory: cli

      - name: Build macOS binary (x64)
        run: npm run build:mac-x64
        working-directory: cli

      - name: Build macOS binary (arm64)
        run: npm run build:mac-arm64
        working-directory: cli

      - name: Build Linux binary (x64)
        run: npm run build:linux
        working-directory: cli

      - name: List built binaries
        run: ls -lh cli/dist/

      - name: Upload CLI binaries artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli-binaries
          path: |
            cli/dist/oclaw-win-x64.exe
            cli/dist/oclaw-darwin-x64
            cli/dist/oclaw-darwin-arm64
            cli/dist/oclaw-linux-x64
          retention-days: 1

  # ── 3. Build GUI (all platforms via matrix) ────────────────────────────────
  build-gui:
    name: Build ${{ matrix.name }} GUI
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            electron_cache: ~/AppData/Local/electron/Cache
            build_cmd: build:win
            artifact_name: gui-win
            artifact_path: gui/dist/**/*.exe
          - os: macos-latest
            name: macOS
            electron_cache: ~/Library/Caches/electron
            build_cmd: build:mac
            artifact_name: gui-mac
            artifact_path: gui/dist/*.dmg
          - os: ubuntu-latest
            name: Linux
            electron_cache: ~/.cache/electron
            build_cmd: build:linux
            artifact_name: gui-linux
            artifact_path: gui/dist/*.AppImage

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ${{ matrix.electron_cache }}
          key: ${{ runner.os }}-electron-${{ hashFiles('gui/package.json') }}

      - name: Cache GUI node_modules
        uses: actions/cache@v4
        id: cache-gui-node-modules
        with:
          path: gui/node_modules
          key: ${{ runner.os }}-node20-gui-node-modules-${{ hashFiles('gui/package.json') }}

      - name: Set version from tag
        id: ver
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update GUI version in package.json
        shell: bash
        run: |
          cd gui
          npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version
        continue-on-error: true

      - name: Generate placeholder icons
        run: node scripts/gen-icons.js

      - name: Install GUI dependencies
        if: steps.cache-gui-node-modules.outputs.cache-hit != 'true'
        run: npm install
        working-directory: gui

      - name: Build GUI
        run: npm run ${{ matrix.build_cmd }}
        working-directory: gui
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable code signing – no certificate available in CI
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: List GUI build output
        shell: bash
        run: ls -lh gui/dist/

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 1

  # ── 4. Create GitHub Release ────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-cli, build-gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download CLI binaries
        uses: actions/download-artifact@v8
        with:
          name: cli-binaries
          path: artifacts/cli/

      - name: Download Windows GUI
        uses: actions/download-artifact@v8
        with:
          name: gui-win
          path: artifacts/gui/win/

      - name: Download macOS GUI
        uses: actions/download-artifact@v8
        with:
          name: gui-mac
          path: artifacts/gui/mac/

      - name: Download Linux GUI
        uses: actions/download-artifact@v8
        with:
          name: gui-linux
          path: artifacts/gui/linux/

      - name: Make CLI binaries executable
        run: chmod +x artifacts/cli/oclaw-darwin-x64 artifacts/cli/oclaw-darwin-arm64 artifacts/cli/oclaw-linux-x64 || true

      - name: Generate SHA-256 checksums
        run: |
          cd artifacts
          echo "# SHA-256 Checksums for openclaw-install-cn ${{ steps.ver.outputs.tag }}" > checksums.sha256
          echo "" >> checksums.sha256
          find cli/ gui/ -type f | sort | while read f; do
            sha256sum "$f" >> checksums.sha256
          done
          # Also checksum the scripts
          sha256sum ../scripts/install.sh | sed 's|../||' >> checksums.sha256
          sha256sum ../scripts/install.ps1 | sed 's|../||' >> checksums.sha256
          echo ""
          cat checksums.sha256

      - name: Package artifacts for CDN
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          mkdir -p cdn-packages

          # CLI packages only – go to cli/{installer-ver}/ on CDN.
          # OpenClaw app packages ({openclaw-ver}/openclaw-*) are handled
          # independently by sync-openclaw.yml.
          (cd artifacts/cli && zip "$OLDPWD/cdn-packages/oclaw-${VERSION}-win32-x64.zip" oclaw-win-x64.exe)
          (cd artifacts/cli && tar -czf "$OLDPWD/cdn-packages/oclaw-${VERSION}-darwin-x64.tar.gz" oclaw-darwin-x64)
          (cd artifacts/cli && tar -czf "$OLDPWD/cdn-packages/oclaw-${VERSION}-darwin-arm64.tar.gz" oclaw-darwin-arm64)
          (cd artifacts/cli && tar -czf "$OLDPWD/cdn-packages/oclaw-${VERSION}-linux-x64.tar.gz" oclaw-linux-x64)

          echo "CDN packages created:"
          ls -lh cdn-packages/ || echo "(no packages created)"

      - name: Update CDN manifest versions
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Update CLI manifest only.
          # manifest.json (OpenClaw app versions) is managed independently
          # by sync-openclaw.yml and is NOT modified here.
          python3 - <<'EOF'
          import json, sys, os, hashlib, glob as _glob

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, 'rb') as f:
                  for chunk in iter(lambda: f.read(65536), b''):
                      h.update(chunk)
              return h.hexdigest()

          def checksum_for(pattern):
              matches = _glob.glob(pattern)
              if not matches:
                  print(f"WARNING: No file found for pattern '{pattern}' – using placeholder")
                  return 'sha256:REPLACE_WITH_ACTUAL'
              if len(matches) > 1:
                  print(f"WARNING: Multiple files match '{pattern}': {matches} – using first match")
              return 'sha256:' + sha256_file(matches[0])

          version = os.environ.get('VERSION', '')
          if not version:
              print("No version set, skipping manifest update")
              sys.exit(0)

          cdn_dir = 'cdn-packages'

          # Compute checksums for CLI CDN packages
          cli_checksums = {
              'win32-x64':    checksum_for(f'{cdn_dir}/oclaw-{version}-win32-x64.zip'),
              'darwin-x64':   checksum_for(f'{cdn_dir}/oclaw-{version}-darwin-x64.tar.gz'),
              'darwin-arm64': checksum_for(f'{cdn_dir}/oclaw-{version}-darwin-arm64.tar.gz'),
              'linux-x64':    checksum_for(f'{cdn_dir}/oclaw-{version}-linux-x64.tar.gz'),
          }

          print(f"CLI checksums: {cli_checksums}")

          # Update CLI manifest
          cli_manifest_path = 'cdn-template/cli-manifest.json'
          with open(cli_manifest_path, 'r') as f:
              cli_manifest = json.load(f)
          cli_versions = cli_manifest.get('versions', [])
          if not any(v['version'] == version for v in cli_versions):
              cli_entry = {
                  "version": version,
                  "releaseDate": __import__('datetime').date.today().isoformat(),
                  "files": {
                      "win32-x64":    f"oclaw-{version}-win32-x64.zip",
                      "darwin-x64":   f"oclaw-{version}-darwin-x64.tar.gz",
                      "darwin-arm64": f"oclaw-{version}-darwin-arm64.tar.gz",
                      "linux-x64":    f"oclaw-{version}-linux-x64.tar.gz"
                  },
                  "checksums": cli_checksums
              }
              cli_versions.insert(0, cli_entry)
              cli_manifest['versions'] = cli_versions
          cli_manifest['latest'] = version
          with open(cli_manifest_path, 'w') as f:
              json.dump(cli_manifest, f, indent=2, ensure_ascii=False)
          print(f"Updated {cli_manifest_path} with version {version}")
          EOF
        env:
          VERSION: ${{ steps.ver.outputs.version }}

      - name: Fetch latest OpenClaw version from openclaw/openclaw
        id: openclaw_ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPENCLAW_VERSION=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/openclaw/openclaw/releases/latest \
            | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              tag = data.get('tag_name', '')
              if not tag:
                  raise ValueError('tag_name missing or empty in API response')
              print(tag, end='')
          except Exception as e:
              sys.stderr.write(f'WARNING: Could not determine OpenClaw version: {e}\n')
              sys.exit(1)
          ") || { echo "::warning::Could not fetch latest OpenClaw version from openclaw/openclaw; leaving version blank"; OPENCLAW_VERSION=""; }
          echo "openclaw_version=${OPENCLAW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Latest OpenClaw version: ${OPENCLAW_VERSION:-<unknown>}"

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          OPENCLAW_VERSION="${{ steps.openclaw_ver.outputs.openclaw_version }}"
          cat > /tmp/release-notes.md << NOTES
          ## OpenClaw Installer ${TAG}

          > 🔖 **当前 OpenClaw 最新版本：${OPENCLAW_VERSION}**

          本版本通过 GitHub Actions 自动构建，包含以下组件：

          ### 📦 CLI 工具 (`oclaw`)

          | 文件 | 平台 | 架构 |
          |------|------|------|
          | \`oclaw-win-x64.exe\` | Windows | x64 |
          | \`oclaw-darwin-x64\` | macOS | Intel x64 |
          | \`oclaw-darwin-arm64\` | macOS | Apple Silicon |
          | \`oclaw-linux-x64\` | Linux | x64 |

          **使用方式：**
          \`\`\`bash
          # 安装 OpenClaw
          oclaw install
          # 检查和升级
          oclaw upgrade
          \`\`\`

          ### 🖥️ GUI 安装程序

          | 文件 | 平台 | 说明 |
          |------|------|------|
          | \`openclaw-gui-setup-${VERSION}-x64.exe\` | Windows | NSIS 安装向导（推荐）|
          | \`openclaw-gui-${VERSION}-win-x64.exe\` | Windows | 免安装便携版 |
          | \`openclaw-gui-${VERSION}-mac-x64.dmg\` | macOS | Intel x64 磁盘映像 |
          | \`openclaw-gui-${VERSION}-mac-arm64.dmg\` | macOS | Apple Silicon 磁盘映像 |
          | \`openclaw-gui-${VERSION}-linux-x64.AppImage\` | Linux | AppImage 便携版 |

          ### 🛠️ 引导脚本

          | 文件 | 说明 |
          |------|------|
          | \`install.sh\` | macOS / Linux 一键安装 |
          | \`install.ps1\` | Windows PowerShell 一键安装 |

          **macOS / Linux 使用方式：**
          \`\`\`bash
          curl -fsSL https://oclaw.chatu.plus/install.sh | bash
          \`\`\`

          **Windows 使用方式：**
          \`\`\`powershell
          irm https://oclaw.chatu.plus/install.ps1 | iex
          \`\`\`

          ### 📋 CDN 模板文件

          | 文件 | 说明 |
          |------|------|
          | \`manifest.json\` | OpenClaw 包版本清单模板 |
          | \`cli-manifest.json\` | oclaw CLI 版本清单模板 |

          ### 📌 离线安装说明（CLI）

          本次发布包含 `oclaw` CLI 工具的离线包。使用离线（air-gap）模式时，请将本次 GitHub Release 附件中的 CLI 包按以下目录结构放置，并设置环境变量后运行安装脚本：

          \`\`\`
          openclaw-bundle/
            cli-manifest.json
            cli/${VERSION}/oclaw-${VERSION}-{os}-{arch}.{zip|tar.gz}
            manifest.json              ← 从 CDN 下载（由 sync-openclaw 维护）
            {openclaw-ver}/openclaw-{openclaw-ver}-{os}-{arch}.{zip|tar.gz}
          \`\`\`

          > OpenClaw 应用安装包（`{openclaw-ver}/openclaw-*`）由 `sync-openclaw.yml` 独立发布，
          > 请从 CDN 直接下载对应版本，或在 GitHub Actions 页面手动触发 sync-openclaw 以获取特定版本。

          **macOS / Linux：**
          \`\`\`bash
          export OCLAW_LOCAL_BUNDLE=/path/to/openclaw-bundle
          bash install.sh
          \`\`\`

          **Windows：**
          \`\`\`powershell
          \$env:OCLAW_LOCAL_BUNDLE = "C:\path\to\openclaw-bundle"
          .\install.ps1
          \`\`\`

          ### 🔒 校验和

          见附件 \`checksums.sha256\`

          ---
          详细部署文档：[docs/deployment.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/deployment.md)
          NOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.0.0
        with:
          name: "OpenClaw Installer ${{ steps.ver.outputs.tag }}"
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: false
          files: |
            artifacts/cli/oclaw-win-x64.exe
            artifacts/cli/oclaw-darwin-x64
            artifacts/cli/oclaw-darwin-arm64
            artifacts/cli/oclaw-linux-x64
            artifacts/gui/win/**/*.exe
            artifacts/gui/mac/*.dmg
            artifacts/gui/linux/*.AppImage
            scripts/install.sh
            scripts/install.ps1
            cdn-template/manifest.json
            cdn-template/cli-manifest.json
            artifacts/checksums.sha256

      # Upload cdn-packages and updated manifests as artifacts so that
      # deploy-to-cos can reuse them without re-packaging from scratch.
      - name: Upload CDN packages artifact
        uses: actions/upload-artifact@v7
        with:
          name: cdn-packages
          path: cdn-packages/
          retention-days: 1

      - name: Upload CDN manifests artifact
        uses: actions/upload-artifact@v7
        with:
          name: cdn-manifests
          path: |
            cdn-template/cli-manifest.json
          retention-days: 1

  # ── 5. Upload to Tencent COS (official CDN) ────────────────────────────────
  deploy-to-cos:
    name: Upload to Tencent COS
    needs: release
    runs-on: ubuntu-latest
    environment: TencentSecretId
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Reuse the cdn-packages and updated manifests built by the release job
      # instead of re-downloading all binaries and re-packaging them.
      - name: Download CDN packages
        uses: actions/download-artifact@v8
        with:
          name: cdn-packages
          path: cdn-packages/

      - name: Download CDN manifests
        uses: actions/download-artifact@v8
        with:
          name: cdn-manifests
          path: cdn-template/

      - name: Download Windows GUI artifact
        uses: actions/download-artifact@v8
        with:
          name: gui-win
          path: artifacts/gui/win/

      - name: Download macOS GUI artifact
        uses: actions/download-artifact@v8
        with:
          name: gui-mac
          path: artifacts/gui/mac/

      - name: Download Linux GUI artifact
        uses: actions/download-artifact@v8
        with:
          name: gui-linux
          path: artifacts/gui/linux/

      - name: Install coscmd
        run: pip install coscmd

      - name: Configure coscmd
        run: |
          coscmd config \
            -a "${{ secrets.SECRETID }}" \
            -s "${{ secrets.SECRETKEY }}" \
            -b "${{ vars.BUCKET }}" \
            -r "${{ vars.REGION }}"

      - name: Upload packages to COS
        run: |
          VERSION="${{ steps.ver.outputs.version }}"

          # Helper: upload only if the object doesn't already exist on COS.
          # Versioned packages are immutable, so skipping re-uploads saves time
          # and avoids accidental overwrites when a release job is re-run.
          cos_upload_if_new() {
            local src="$1"
            local dst="$2"
            if coscmd info "$dst" > /dev/null 2>&1; then
              echo "SKIP  $dst (already exists on COS)"
            else
              echo "UPLOAD $src -> $dst"
              coscmd upload "$src" "$dst"
            fi
          }

          # Upload CLI packages (required – job fails if any are missing)
          cos_upload_if_new cdn-packages/oclaw-${VERSION}-win32-x64.zip       cli/${VERSION}/oclaw-${VERSION}-win32-x64.zip
          cos_upload_if_new cdn-packages/oclaw-${VERSION}-darwin-x64.tar.gz   cli/${VERSION}/oclaw-${VERSION}-darwin-x64.tar.gz
          cos_upload_if_new cdn-packages/oclaw-${VERSION}-darwin-arm64.tar.gz cli/${VERSION}/oclaw-${VERSION}-darwin-arm64.tar.gz
          cos_upload_if_new cdn-packages/oclaw-${VERSION}-linux-x64.tar.gz    cli/${VERSION}/oclaw-${VERSION}-linux-x64.tar.gz

          # Note: OpenClaw app packages ({openclaw-ver}/openclaw-*) are uploaded
          # independently by sync-openclaw.yml – not here.

          # Upload GUI offline installer packages to gui/{VERSION}/ on COS.
          # Windows: NSIS installer and portable exe (search recursively, skip win-unpacked/).
          # macOS: DMG disk images (x64 and arm64).
          # Linux: AppImage portable executable.
          find artifacts/gui/win/ -type f -name "*.exe" ! -path "*/win-unpacked/*" | while read -r f; do
            fname="$(basename "$f")"
            cos_upload_if_new "$f" "gui/${VERSION}/${fname}"
          done
          find artifacts/gui/mac/ -name "*.dmg" | while read -r f; do
            fname="$(basename "$f")"
            cos_upload_if_new "$f" "gui/${VERSION}/${fname}"
          done
          find artifacts/gui/linux/ -name "*.AppImage" | while read -r f; do
            fname="$(basename "$f")"
            cos_upload_if_new "$f" "gui/${VERSION}/${fname}"
          done

          # Upload install scripts and CLI manifest (always overwrite – these are not versioned).
          # manifest.json (openclaw app packages) is managed by sync-openclaw.yml – NOT uploaded here.
          coscmd upload scripts/install.sh  install.sh
          coscmd upload scripts/install.ps1 install.ps1
          coscmd upload cdn-template/cli-manifest.json cli-manifest.json

      - name: Refresh CDN cache
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          CDN_DOMAIN: https://oclaw.chatu.plus
        run: |
          pip install tccli==3.1.48.1
          tccli configure set \
            secretId  "${{ secrets.SECRETID }}" \
            secretKey "${{ secrets.SECRETKEY }}" \
            region    "ap-guangzhou"

          # Build JSON array of URLs to purge.
          # Always purge overwritten files (cli-manifest + install scripts) and
          # the versioned CLI and GUI packages uploaded in this release.
          # manifest.json is NOT purged here – that is sync-openclaw.yml's job.
          URLS=$(python3 - <<'PYEOF'
          import json, os
          base = os.environ['CDN_DOMAIN']
          v    = os.environ['VERSION']
          print(json.dumps([
              base + '/cli-manifest.json',
              base + '/install.sh',
              base + '/install.ps1',
              base + '/cli/' + v + '/oclaw-' + v + '-win32-x64.zip',
              base + '/cli/' + v + '/oclaw-' + v + '-darwin-x64.tar.gz',
              base + '/cli/' + v + '/oclaw-' + v + '-darwin-arm64.tar.gz',
              base + '/cli/' + v + '/oclaw-' + v + '-linux-x64.tar.gz',
              base + '/gui/' + v + '/openclaw-gui-setup-' + v + '-x64.exe',
              base + '/gui/' + v + '/openclaw-gui-' + v + '-win-x64.exe',
              base + '/gui/' + v + '/openclaw-gui-' + v + '-mac-x64.dmg',
              base + '/gui/' + v + '/openclaw-gui-' + v + '-mac-arm64.dmg',
              base + '/gui/' + v + '/openclaw-gui-' + v + '-linux-x64.AppImage',
          ]))
          PYEOF
          )
          echo "Purging CDN URLs: $URLS"
          tccli cdn PurgeUrlsCache --Urls "$URLS"
          echo "CDN cache purge submitted successfully"
