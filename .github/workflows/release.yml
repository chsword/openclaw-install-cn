name: Release

# Triggered by:
#   1. Pushing a semver tag:  git tag v1.2.3 && git push origin v1.2.3
#   2. Workflow dispatch from ci.yml auto-tag job (works around GITHUB_TOKEN trigger limitation)
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号，支持 1.2.3 或 v1.2.3；留空则基于当前最新版本自动递增 patch'
        required: false
        type: string

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  resolve-version:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      source: ${{ steps.resolve.outputs.source }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: resolve
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys
          from pathlib import Path

          stable_re = re.compile(r'^v?(\d+)\.(\d+)\.(\d+)$')
          semver_re = re.compile(r'^v?\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$')

          ref_type = os.environ.get('REF_TYPE', '')
          ref_name = os.environ.get('REF_NAME', '')
          input_version = (os.environ.get('INPUT_VERSION', '') or '').strip()

          def emit(name, value):
              with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
                  fh.write(f'{name}={value}\n')

          def normalize(version):
              return version[1:] if version.startswith('v') else version

          def stable_key(version):
              match = stable_re.fullmatch(version)
              if not match:
                  return None
              return tuple(int(part) for part in match.groups())

          def latest_stable_candidate():
              candidates = []

              try:
                  tag_output = subprocess.check_output(
                      ['git', 'tag', '--list', 'v*'],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  )
                  for raw_tag in tag_output.splitlines():
                      tag = raw_tag.strip()
                      key = stable_key(tag)
                      if key:
                          candidates.append((key, normalize(tag)))
              except subprocess.CalledProcessError:
                  pass

              for path_str, field in [
                  ('cli/package.json', 'version'),
                  ('gui/package.json', 'version'),
                  ('cdn-template/cli-manifest.json', 'latest'),
              ]:
                  path = Path(path_str)
                  if not path.exists():
                      continue
                  try:
                      with path.open('r', encoding='utf-8') as fh:
                          data = json.load(fh)
                      version = str(data.get(field, '')).strip()
                  except Exception:
                      continue
                  key = stable_key(version)
                  if key:
                      candidates.append((key, normalize(version)))

              if not candidates:
                  return '0.0.0'

              candidates.sort(key=lambda item: item[0])
              return candidates[-1][1]

          if ref_type == 'tag':
              version = normalize(ref_name)
              if not semver_re.fullmatch(version):
                  print(f'Invalid tag version: {ref_name}', file=sys.stderr)
                  sys.exit(1)
              source = 'tag'
          else:
              if input_version:
                  version = normalize(input_version)
                  if not semver_re.fullmatch(version):
                      print(
                          f"Invalid manual version '{input_version}'. Expected semver like 1.2.3 or v1.2.3.",
                          file=sys.stderr,
                      )
                      sys.exit(1)
                  source = 'manual-input'
              else:
                  latest = latest_stable_candidate()
                  major, minor, patch = stable_key(latest)
                  version = f'{major}.{minor}.{patch + 1}'
                  source = 'auto-increment'

          tag = f'v{version}'
          print(f'Resolved release version: {version} ({source})')
          emit('version', version)
          emit('tag', tag)
          emit('source', source)
          PY

  # ── 1. Run tests ────────────────────────────────────────────────────────────
  test:
    name: Test CLI
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json
      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-test-node-modules
        with:
          path: cli/node_modules
          key: ${{ runner.os }}-node20-cli-node-modules-${{ hashFiles('cli/package-lock.json') }}
      - run: npm ci
        if: steps.cache-test-node-modules.outputs.cache-hit != 'true'
        working-directory: cli
      - run: npm test
        working-directory: cli

  # ── 2. Build CLI binaries (all platforms cross-compiled on Linux) ──────────
  build-cli:
    name: Build CLI binaries
    needs: [resolve-version, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 18 (matches pkg targets)
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-build-cli-node-modules
        with:
          path: cli/node_modules
          key: ${{ runner.os }}-node18-cli-node-modules-${{ hashFiles('cli/package-lock.json') }}

      - name: Install CLI dependencies
        if: steps.cache-build-cli-node-modules.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: cli

      - name: Set release version
        id: ver
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Update CLI version in package.json
        run: |
          cd cli
          npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version
        continue-on-error: true   # non-fatal if version already matches

      - name: Build Windows binary (x64)
        run: npm run build:win
        working-directory: cli

      - name: Build macOS binary (x64)
        run: npm run build:mac-x64
        working-directory: cli

      - name: Build macOS binary (arm64)
        run: npm run build:mac-arm64
        working-directory: cli

      - name: Build Linux binary (x64)
        run: npm run build:linux
        working-directory: cli

      - name: List built binaries
        run: ls -lh cli/dist/

      - name: Upload CLI binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-binaries
          path: |
            cli/dist/oclaw-win-x64.exe
            cli/dist/oclaw-darwin-x64
            cli/dist/oclaw-darwin-arm64
            cli/dist/oclaw-linux-x64
          retention-days: 1

  # ── 3. Build GUI (all platforms via matrix) ────────────────────────────────
  build-gui:
    name: Build ${{ matrix.name }} GUI
    needs: [resolve-version, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            build_cmd: build:win
            artifact_name: gui-win
            artifact_path: gui/dist/**/*.exe
          - os: macos-latest
            name: macOS
            build_cmd: build:mac
            artifact_name: gui-mac
            artifact_path: gui/dist/*.dmg
          - os: ubuntu-latest
            name: Linux
            build_cmd: build:linux
            artifact_name: gui-linux
            artifact_path: gui/dist/*.AppImage

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux GUI build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "gui/src-tauri -> target"

      - name: Cache GUI node_modules
        uses: actions/cache@v4
        id: cache-gui-node-modules
        with:
          path: gui/node_modules
          key: ${{ runner.os }}-node20-gui-node-modules-${{ hashFiles('gui/package.json') }}

      - name: Set release version
        id: ver
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update GUI version in package.json
        shell: bash
        run: |
          cd gui
          npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version
        continue-on-error: true

      - name: Generate placeholder icons
        run: node scripts/gen-icons.js

      - name: Install GUI dependencies
        if: steps.cache-gui-node-modules.outputs.cache-hit != 'true'
        run: npm install
        working-directory: gui

      - name: Build GUI
        run: npm run ${{ matrix.build_cmd }}
        working-directory: gui
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List GUI build output
        shell: bash
        run: ls -lh gui/dist/

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 1

  # ── 4. Create GitHub Release ────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [resolve-version, build-cli, build-gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: ver
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${{ needs.resolve-version.outputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Download CLI binaries
        uses: actions/download-artifact@v4
        with:
          name: cli-binaries
          path: artifacts/cli/

      - name: Download Windows GUI
        uses: actions/download-artifact@v4
        with:
          name: gui-win
          path: artifacts/gui/win/

      - name: Download macOS GUI
        uses: actions/download-artifact@v4
        with:
          name: gui-mac
          path: artifacts/gui/mac/

      - name: Download Linux GUI
        uses: actions/download-artifact@v4
        with:
          name: gui-linux
          path: artifacts/gui/linux/

      - name: Make CLI binaries executable
        run: chmod +x artifacts/cli/oclaw-darwin-x64 artifacts/cli/oclaw-darwin-arm64 artifacts/cli/oclaw-linux-x64 || true

      - name: Generate SHA-256 checksums
        run: |
          cd artifacts
          echo "# SHA-256 Checksums for openclaw-install-cn ${{ steps.ver.outputs.tag }}" > checksums.sha256
          echo "" >> checksums.sha256
          find cli/ gui/ -type f | sort | while read f; do
            sha256sum "$f" >> checksums.sha256
          done
          # Also checksum the scripts
          sha256sum ../scripts/install.sh | sed 's|../||' >> checksums.sha256
          sha256sum ../scripts/install.ps1 | sed 's|../||' >> checksums.sha256
          echo ""
          cat checksums.sha256

      - name: Package CLI artifacts for CDN
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          mkdir -p cdn-packages

          # Only the installer CLI binaries are published to CDN here.
          # OpenClaw itself is installed via pnpm and is not mirrored as offline packages.
          # Rename binaries to the canonical names expected by the bootstrap installers.
          cp artifacts/cli/oclaw-win-x64.exe    artifacts/cli/oclaw.exe
          (cd artifacts/cli && zip "$OLDPWD/cdn-packages/oclaw-${VERSION}-win32-x64.zip" oclaw.exe)

          cp artifacts/cli/oclaw-darwin-x64     artifacts/cli/oclaw
          (cd artifacts/cli && tar -czf "$OLDPWD/cdn-packages/oclaw-${VERSION}-darwin-x64.tar.gz" oclaw)

          cp artifacts/cli/oclaw-darwin-arm64   artifacts/cli/oclaw
          (cd artifacts/cli && tar -czf "$OLDPWD/cdn-packages/oclaw-${VERSION}-darwin-arm64.tar.gz" oclaw)

          cp artifacts/cli/oclaw-linux-x64      artifacts/cli/oclaw
          (cd artifacts/cli && tar -czf "$OLDPWD/cdn-packages/oclaw-${VERSION}-linux-x64.tar.gz" oclaw)

          echo "CDN packages created:"
          ls -lh cdn-packages/ || echo "(no packages created)"

      - name: Update CDN manifest versions
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Update CLI manifest only.
          # manifest.json is maintained independently as the latest OpenClaw version marker.
          python3 - <<'EOF'
          import json, sys, os, hashlib, glob as _glob

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, 'rb') as f:
                  for chunk in iter(lambda: f.read(65536), b''):
                      h.update(chunk)
              return h.hexdigest()

          def checksum_for(pattern):
              matches = _glob.glob(pattern)
              if not matches:
                  print(f"WARNING: No file found for pattern '{pattern}' – using placeholder")
                  return 'sha256:REPLACE_WITH_ACTUAL'
              if len(matches) > 1:
                  print(f"WARNING: Multiple files match '{pattern}': {matches} – using first match")
              return 'sha256:' + sha256_file(matches[0])

          version = os.environ.get('VERSION', '')
          if not version:
              print("No version set, skipping manifest update")
              sys.exit(0)

          cdn_dir = 'cdn-packages'

          # Compute checksums for CLI CDN packages
          cli_checksums = {
              'win32-x64':    checksum_for(f'{cdn_dir}/oclaw-{version}-win32-x64.zip'),
              'darwin-x64':   checksum_for(f'{cdn_dir}/oclaw-{version}-darwin-x64.tar.gz'),
              'darwin-arm64': checksum_for(f'{cdn_dir}/oclaw-{version}-darwin-arm64.tar.gz'),
              'linux-x64':    checksum_for(f'{cdn_dir}/oclaw-{version}-linux-x64.tar.gz'),
          }

          print(f"CLI checksums: {cli_checksums}")

          # Update CLI manifest
          cli_manifest_path = 'cdn-template/cli-manifest.json'
          with open(cli_manifest_path, 'r') as f:
              cli_manifest = json.load(f)
          cli_versions = cli_manifest.get('versions', [])
          if not any(v['version'] == version for v in cli_versions):
              cli_entry = {
                  "version": version,
                  "releaseDate": __import__('datetime').date.today().isoformat(),
                  "files": {
                      "win32-x64":    f"oclaw-{version}-win32-x64.zip",
                      "darwin-x64":   f"oclaw-{version}-darwin-x64.tar.gz",
                      "darwin-arm64": f"oclaw-{version}-darwin-arm64.tar.gz",
                      "linux-x64":    f"oclaw-{version}-linux-x64.tar.gz"
                  },
                  "checksums": cli_checksums
              }
              cli_versions.insert(0, cli_entry)
              cli_manifest['versions'] = cli_versions
          cli_manifest['latest'] = version
          with open(cli_manifest_path, 'w') as f:
              json.dump(cli_manifest, f, indent=2, ensure_ascii=False)
          print(f"Updated {cli_manifest_path} with version {version}")
          EOF
        env:
          VERSION: ${{ steps.ver.outputs.version }}

      - name: Fetch latest OpenClaw version from openclaw/openclaw
        id: openclaw_ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPENCLAW_VERSION=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/openclaw/openclaw/releases/latest \
            | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              tag = data.get('tag_name', '')
              if not tag:
                  raise ValueError('tag_name missing or empty in API response')
              print(tag, end='')
          except Exception as e:
              sys.stderr.write(f'WARNING: Could not determine OpenClaw version: {e}\n')
              sys.exit(1)
          ") || { echo "::warning::Could not fetch latest OpenClaw version from openclaw/openclaw; leaving version blank"; OPENCLAW_VERSION=""; }
          echo "openclaw_version=${OPENCLAW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Latest OpenClaw version: ${OPENCLAW_VERSION:-<unknown>}"

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          OPENCLAW_VERSION="${{ steps.openclaw_ver.outputs.openclaw_version }}"
          cat > /tmp/release-notes.md << NOTES
          ## OpenClaw Installer ${TAG}

          > 🔖 **当前 OpenClaw 最新版本：${OPENCLAW_VERSION}**

          本版本通过 GitHub Actions 自动构建，包含以下组件：

          ### 📦 CLI 工具 (`oclaw`)

          | 文件 | 平台 | 架构 |
          |------|------|------|
          | \`oclaw-win-x64.exe\` | Windows | x64 |
          | \`oclaw-darwin-x64\` | macOS | Intel x64 |
          | \`oclaw-darwin-arm64\` | macOS | Apple Silicon |
          | \`oclaw-linux-x64\` | Linux | x64 |

          **CLI 行为：**
          \`\`\`bash
          # 检查环境与安装状态
          oclaw status --check-updates
          # 安装 OpenClaw
          oclaw install
          # 检查和升级
          oclaw upgrade
          \`\`\`

          CLI 和 GUI 会先检查 Node.js、pnpm 和当前 OpenClaw 版本，再自动完成安装或升级流程，并统一使用中国大陆可访问的 npm 镜像源。

          ### 🖥️ GUI 安装程序

          | 文件 | 平台 | 说明 |
          |------|------|------|
          | \`openclaw-gui-setup-${VERSION}-x64.exe\` | Windows | NSIS 安装向导（推荐）|
          | \`openclaw-gui-${VERSION}-win32-x64.exe\` | Windows | 免安装便携版 |
          | \`openclaw-gui-${VERSION}-darwin-x64.dmg\` | macOS | Intel x64 磁盘映像 |
          | \`openclaw-gui-${VERSION}-darwin-arm64.dmg\` | macOS | Apple Silicon 磁盘映像 |
          | \`openclaw-gui-${VERSION}-linux-x86_64.AppImage\` | Linux | AppImage 便携版 |

          ### 🛠️ 引导脚本

          | 文件 | 说明 |
          |------|------|
          | \`install.sh\` | macOS / Linux 一键安装 |
          | \`install.ps1\` | Windows PowerShell 一键安装 |

          **macOS / Linux 使用方式：**
          \`\`\`bash
          curl -fsSL https://oclaw.chatu.plus/install.sh | bash
          \`\`\`

          **Windows 使用方式：**
          \`\`\`powershell
          irm https://oclaw.chatu.plus/install.ps1 | iex
          \`\`\`

          ### 📋 CDN 模板文件

          | 文件 | 说明 |
          |------|------|
          | \`manifest.json\` | OpenClaw 最新版本标记模板 |
          | \`cli-manifest.json\` | oclaw CLI 版本清单模板 |

          ### 🔒 校验和

          见附件 \`checksums.sha256\`

          ---
          详细部署文档：[docs/deployment.md](https://github.com/${{ github.repository }}/blob/${{ steps.ver.outputs.tag }}/docs/deployment.md)
          NOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: "OpenClaw Installer ${{ steps.ver.outputs.tag }}"
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}
          fail_on_unmatched_files: false
          files: |
            artifacts/cli/oclaw-win-x64.exe
            artifacts/cli/oclaw-darwin-x64
            artifacts/cli/oclaw-darwin-arm64
            artifacts/cli/oclaw-linux-x64
            artifacts/gui/win/**/*.exe
            artifacts/gui/mac/*.dmg
            artifacts/gui/linux/*.AppImage
            scripts/install.sh
            scripts/install.ps1
            cdn-template/manifest.json
            cdn-template/cli-manifest.json
            artifacts/checksums.sha256

      # Upload installer CLI packages and updated manifests as artifacts so that
      # deploy-to-cos can reuse them without re-packaging from scratch.
      - name: Upload CDN packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdn-packages
          path: cdn-packages/
          retention-days: 1

      - name: Upload CDN manifests artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdn-manifests
          path: |
            cdn-template/cli-manifest.json
          retention-days: 1

  # ── 5. Upload to Tencent COS (official CDN) ────────────────────────────────
  deploy-to-cos:
    name: Upload to Tencent COS
    needs: [resolve-version, release]
    runs-on: ubuntu-latest
    environment: TencentSecretId
    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: ver
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Reuse the installer CLI packages and updated manifests built by the release job.
      - name: Download CDN packages
        uses: actions/download-artifact@v4
        with:
          name: cdn-packages
          path: cdn-packages/

      - name: Download CDN manifests
        uses: actions/download-artifact@v4
        with:
          name: cdn-manifests
          path: cdn-template/

      - name: Download Windows GUI artifact
        uses: actions/download-artifact@v4
        with:
          name: gui-win
          path: artifacts/gui/win/

      - name: Download macOS GUI artifact
        uses: actions/download-artifact@v4
        with:
          name: gui-mac
          path: artifacts/gui/mac/

      - name: Download Linux GUI artifact
        uses: actions/download-artifact@v4
        with:
          name: gui-linux
          path: artifacts/gui/linux/

      - name: Install coscmd
        run: pip install coscmd

      - name: Configure coscmd
        run: |
          coscmd config \
            -a "${{ secrets.SECRETID }}" \
            -s "${{ secrets.SECRETKEY }}" \
            -b "${{ vars.BUCKET }}" \
            -r "${{ vars.REGION }}"

      - name: Upload packages to COS
        run: |
          VERSION="${{ steps.ver.outputs.version }}"

          # Helper: upload only if the object doesn't already exist on COS.
          # Versioned packages are immutable, so skipping re-uploads saves time
          # and avoids accidental overwrites when a release job is re-run.
          cos_upload_if_new() {
            local src="$1"
            local dst="$2"
            if coscmd info "$dst" > /dev/null 2>&1; then
              echo "SKIP  $dst (already exists on COS)"
            else
              echo "UPLOAD $src -> $dst"
              coscmd upload "$src" "$dst"
            fi
          }

          # Upload versioned installer CLI packages.
          cos_upload_if_new cdn-packages/oclaw-${VERSION}-win32-x64.zip       cli/${VERSION}/oclaw-${VERSION}-win32-x64.zip
          cos_upload_if_new cdn-packages/oclaw-${VERSION}-darwin-x64.tar.gz   cli/${VERSION}/oclaw-${VERSION}-darwin-x64.tar.gz
          cos_upload_if_new cdn-packages/oclaw-${VERSION}-darwin-arm64.tar.gz cli/${VERSION}/oclaw-${VERSION}-darwin-arm64.tar.gz
          cos_upload_if_new cdn-packages/oclaw-${VERSION}-linux-x64.tar.gz    cli/${VERSION}/oclaw-${VERSION}-linux-x64.tar.gz

          # Upload GUI installer packages to gui/{VERSION}/ on COS.
          find artifacts/gui/win/ -type f -name "*.exe" ! -path "*/win-unpacked/*" | while read -r f; do
            fname="$(basename "$f")"
            cos_upload_if_new "$f" "gui/${VERSION}/${fname}"
          done
          find artifacts/gui/mac/ -name "*.dmg" | while read -r f; do
            fname="$(basename "$f")"
            cos_upload_if_new "$f" "gui/${VERSION}/${fname}"
          done
          find artifacts/gui/linux/ -name "*.AppImage" | while read -r f; do
            fname="$(basename "$f")"
            cos_upload_if_new "$f" "gui/${VERSION}/${fname}"
          done

          # Upload install scripts and CLI manifest (always overwrite – these are not versioned).
          # manifest.json is managed by sync-openclaw.yml as the latest OpenClaw version marker.
          coscmd upload scripts/install.sh  install.sh
          coscmd upload scripts/install.ps1 install.ps1
          coscmd upload cdn-template/cli-manifest.json cli-manifest.json

      - name: Refresh CDN cache
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          CDN_DOMAIN: https://oclaw.chatu.plus
        run: |
          pip install tccli==3.1.48.1
          tccli configure set \
            secretId  "${{ secrets.SECRETID }}" \
            secretKey "${{ secrets.SECRETKEY }}" \
            region    "ap-guangzhou"

          # Build JSON array of URLs to purge.
          # Always purge overwritten files (cli-manifest + install scripts) and
          # the versioned CLI and GUI packages uploaded in this release.
          # manifest.json is NOT purged here – that is sync-openclaw.yml's job.
          URLS=$(python3 - <<'PYEOF'
          import json, os
          base = os.environ['CDN_DOMAIN']
          v    = os.environ['VERSION']
          print(json.dumps([
              base + '/cli-manifest.json',
              base + '/install.sh',
              base + '/install.ps1',
              base + '/cli/' + v + '/oclaw-' + v + '-win32-x64.zip',
              base + '/cli/' + v + '/oclaw-' + v + '-darwin-x64.tar.gz',
              base + '/cli/' + v + '/oclaw-' + v + '-darwin-arm64.tar.gz',
              base + '/cli/' + v + '/oclaw-' + v + '-linux-x64.tar.gz',
              base + '/gui/' + v + '/openclaw-gui-setup-' + v + '-x64.exe',
              base + '/gui/' + v + '/openclaw-gui-' + v + '-win32-x64.exe',
              base + '/gui/' + v + '/openclaw-gui-' + v + '-darwin-x64.dmg',
              base + '/gui/' + v + '/openclaw-gui-' + v + '-darwin-arm64.dmg',
              base + '/gui/' + v + '/openclaw-gui-' + v + '-linux-x86_64.AppImage',
          ]))
          PYEOF
          )
          echo "Purging CDN URLs: $URLS"
          tccli cdn PurgeUrlsCache --Urls "$URLS"
          echo "CDN cache purge submitted successfully"

  persist-version:
    name: Record latest version
    needs: [resolve-version, release, deploy-to-cos]
    if: github.event_name == 'workflow_dispatch' && github.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Download CDN manifests
        uses: actions/download-artifact@v4
        with:
          name: cdn-manifests
          path: cdn-template/

      - name: Update tracked version files
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          cd cli
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          cd ../gui
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Commit latest version metadata
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cli/package.json gui/package.json cdn-template/cli-manifest.json
          if git diff --cached --quiet; then
            echo "No version metadata changes to commit"
            exit 0
          fi
          git commit -m "chore: record release version v${VERSION}"
          git push origin "HEAD:${{ github.ref_name }}"
