name: Sync OpenClaw Latest Version

# Updates cdn-template/manifest.json so it only tracks the latest upstream
# OpenClaw version. No upstream packages are downloaded, cached, or repackaged.
on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:
    inputs:
      version:
        description: >
          OpenClaw version to sync (e.g. "2026.3.8").
          Leave empty to auto-detect the latest release from openclaw/openclaw.
        required: false
        default: ''

permissions:
  contents: write

jobs:
  sync:
    name: Sync OpenClaw latest version marker
    runs-on: ubuntu-latest
    environment: TencentSecretId

    steps:
      - uses: actions/checkout@v6

      - name: Detect upstream OpenClaw version
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"      # strip leading 'v' if present
            TAG="v${VERSION}"
          else
            TAG=$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/openclaw/openclaw/releases/latest \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
            VERSION="${TAG#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "Upstream OpenClaw version: $VERSION (tag: $TAG)"

      - name: Check if already synced
        id: check
        run: |
          VERSION="${{ steps.detect.outputs.version }}"
          PRESENT=$(python3 - <<PYEOF
          import json, sys
          try:
              m = json.load(open('cdn-template/manifest.json'))
              print('true' if str(m.get('latest', '')).strip() == '$VERSION' else 'false')
          except Exception as e:
              sys.stderr.write(f'Warning: {e}\n')
              print('false')
          PYEOF
          )
          echo "already_present=$PRESENT" >> "$GITHUB_OUTPUT"
          if [ "$PRESENT" = "true" ]; then
            echo "::notice::OpenClaw $VERSION is already the latest version in manifest.json – nothing to do."
          else
            echo "OpenClaw $VERSION is new – will sync manifest and CDN metadata."
          fi

      - name: Update cdn-template/manifest.json
        if: steps.check.outputs.already_present != 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version }}
        run: |
          python3 - <<'PYEOF'
          import json, os, datetime

          version = os.environ['VERSION']

          manifest_path = 'cdn-template/manifest.json'
          with open(manifest_path) as f:
              manifest = json.load(f)

          manifest['versions'] = [{
              'version': version,
              'releaseDate': datetime.date.today().isoformat(),
              'description': f'OpenClaw {version}',
          }]
          manifest['latest'] = version

          with open(manifest_path, 'w') as f:
              json.dump(manifest, f, indent=2, ensure_ascii=False)
              f.write('\n')
          print(f'Updated {manifest_path}  latest={version}')
          PYEOF

      - name: Upload manifest to COS
        if: steps.check.outputs.already_present != 'true'
        run: |
          COS_BUCKET="${{ vars.BUCKET }}"
          COS_REGION="${{ vars.REGION }}"
          if [ -z "${COS_BUCKET}" ] || [ -z "${COS_REGION}" ]; then
            echo "::warning::COS credentials (BUCKET/REGION) are not configured – skipping CDN upload. manifest.json is still committed to the repository."
            exit 0
          fi

          pip install coscmd
          coscmd config \
            -a "${{ secrets.SECRETID }}" \
            -s "${{ secrets.SECRETKEY }}" \
            -b "${COS_BUCKET}" \
            -r "${COS_REGION}"

          coscmd upload cdn-template/manifest.json manifest.json

      - name: Refresh CDN cache
        if: steps.check.outputs.already_present != 'true'
        env:
          CDN_DOMAIN: https://oclaw.chatu.plus
          COS_BUCKET: ${{ vars.BUCKET }}
          COS_REGION: ${{ vars.REGION }}
        run: |
          # Skip CDN cache refresh if credentials are not configured.
          if [ -z "${COS_BUCKET}" ] || [ -z "${COS_REGION}" ]; then
            echo "::warning::COS credentials (BUCKET/REGION) are not configured – skipping CDN cache refresh."
            exit 0
          fi

          pip install tccli==3.1.48.1
          tccli configure set \
            secretId  "${{ secrets.SECRETID }}" \
            secretKey "${{ secrets.SECRETKEY }}" \
            region    "ap-guangzhou"

          URLS=$(python3 - <<'PYEOF'
          import json, os
          print(json.dumps([os.environ['CDN_DOMAIN'] + '/manifest.json']))
          PYEOF
          )
          echo "Purging CDN URLs: $URLS"
          tccli cdn PurgeUrlsCache --Urls "$URLS"
          echo "CDN cache purge submitted."

      - name: Commit manifest.json update
        if: steps.check.outputs.already_present != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cdn-template/manifest.json
          if git diff --cached --quiet; then
            echo "No changes to commit (manifest already up-to-date)."
          else
            git commit -m "chore: sync openclaw ${{ steps.detect.outputs.version }} → CDN manifest"
            git push origin HEAD
          fi
