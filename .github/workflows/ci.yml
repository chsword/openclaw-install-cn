name: CI

# Runs on every push/PR to main, develop, and feature branches.
# Includes unit tests, lint, build checks, and release auto-tagging on main.
on:
  push:
    branches:
      - main
      - develop
      - 'copilot/**'
      - 'feature/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'cdn-template/**'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'cdn-template/**'

jobs:
  # ── CLI Tests ──────────────────────────────────────────────────────────────
  # On PRs: run only ubuntu-latest + node 20 to keep CI fast.
  # On main branch push: run the full 3-OS × 3-Node matrix.
  test-cli:
    name: Test CLI (${{ matrix.os }}, node${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJson('["ubuntu-latest"]') || fromJson('["ubuntu-latest", "windows-latest", "macos-latest"]') }}
        node: ${{ github.event_name == 'pull_request' && fromJson('["20"]') || fromJson('["18", "20", "24"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-cli-node-modules
        with:
          path: cli/node_modules
          key: ${{ runner.os }}-node${{ matrix.node }}-cli-node-modules-${{ hashFiles('cli/package-lock.json') }}

      - name: Install CLI dependencies
        if: steps.cache-cli-node-modules.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: cli

      - name: Run tests
        run: npm test
        working-directory: cli

  # ── CLI Lint (Linux only) ──────────────────────────────────────────────────
  # On PRs: node 20 only.  On main: all three Node versions.
  lint-cli:
    name: Lint CLI (node${{ matrix.node }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: ${{ github.event_name == 'pull_request' && fromJson('["20"]') || fromJson('["18", "20", "24"]') }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json
      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-lint-node-modules
        with:
          path: cli/node_modules
          key: ${{ runner.os }}-node${{ matrix.node }}-cli-node-modules-${{ hashFiles('cli/package-lock.json') }}
      - run: npm ci
        if: steps.cache-lint-node-modules.outputs.cache-hit != 'true'
        working-directory: cli
      # eslint is only a devDep if added; skip gracefully if not installed
      - name: Lint (if eslint configured)
        run: |
          if [ -f cli/.eslintrc* ] || grep -q '"eslint"' cli/package.json 2>/dev/null; then
            npm run lint --if-present
          else
            echo "No ESLint configuration found – skipping lint step."
          fi

  # ── Quick build check (Linux only) ───────────────────────────────────────
  # On PRs: node 18 only (pkg build target).  On main: node 18 and 24.
  build-check-cli:
    name: Build CLI (Linux, node${{ matrix.node }})
    needs: test-cli
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: ${{ github.event_name == 'pull_request' && fromJson('["18"]') || fromJson('["18", "24"]') }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json
      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-build-node-modules
        with:
          path: cli/node_modules
          key: ${{ runner.os }}-node${{ matrix.node }}-cli-node-modules-${{ hashFiles('cli/package-lock.json') }}
      - run: npm ci
        if: steps.cache-build-node-modules.outputs.cache-hit != 'true'
        working-directory: cli
      - name: Build Linux binary
        run: npm run build:linux
        working-directory: cli
      - name: Smoke-test binary
        run: |
          ./cli/dist/oclaw-linux-x64 --version
          ./cli/dist/oclaw-linux-x64 status

  # ── Bootstrap scripts sanity checks ────────────────────────────────────────
  test-bootstrap-scripts:
    name: Bootstrap script tests (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate install.sh snippets
        run: |
          grep -q 'NODE_MIRROR' scripts/install.sh
          grep -q 'pnpm add -g openclaw@latest --registry=https://registry.npmmirror.com' scripts/install.sh
          grep -q 'Node.js 18' scripts/install.sh

      - name: Install bats-core
        run: sudo apt-get install -y bats

      - name: Run bats unit tests for install.sh
        run: bats scripts/__tests__/install.sh.bats

  # ── Bootstrap script tests (Windows / Pester) ──────────────────────────────
  test-bootstrap-scripts-windows:
    name: Bootstrap script tests (Windows)
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate install.ps1 snippets
        shell: pwsh
        run: |
          $content = Get-Content 'scripts\install.ps1' -Raw
          foreach ($snippet in @(
            'NodeMirror',
            'npm install -g pnpm',
            'pnpm add -g openclaw@latest --registry=https://registry.npmmirror.com',
            'Node.js 18'
          )) {
            if ($content -notmatch [regex]::Escape($snippet)) {
              Write-Error "Expected snippet not found in install.ps1: $snippet"
              exit 1
            }
          }

      - name: Install Pester 5
        shell: pwsh
        run: Install-Module -Name Pester -Force -SkipPublisherCheck -MinimumVersion 5.0.0

      - name: Run Pester unit tests for install.ps1
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Import-Module Pester
          $cfg = New-PesterConfiguration
          $cfg.Run.Path      = 'scripts/__tests__/install.ps1.Tests.ps1'
          $cfg.Output.Verbosity = 'Detailed'
          $cfg.Run.Exit      = $true
          Invoke-Pester -Configuration $cfg

  # ── GUI Tests ──────────────────────────────────────────────────────────────
  # Tests for gui/src/lib/ modules using Node.js built-in test runner.
  # No npm install needed: all lib modules use only built-in Node.js modules.
  # On PRs: ubuntu-latest + node 20 only.  On main: full 3-OS × 3-Node matrix.
  test-gui:
    name: Test GUI (${{ matrix.os }}, node${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJson('["ubuntu-latest"]') || fromJson('["ubuntu-latest", "windows-latest", "macos-latest"]') }}
        node: ${{ github.event_name == 'pull_request' && fromJson('["20"]') || fromJson('["18", "20", "24"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Run GUI tests
        run: npm test
        working-directory: gui

  # ── Security: npm audit ───────────────────────────────────────────────────
  audit:
    name: Security audit (npm audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-audit-node-modules
        with:
          path: cli/node_modules
          key: ${{ runner.os }}-node20-cli-node-modules-${{ hashFiles('cli/package-lock.json') }}

      - name: Install CLI dependencies
        if: steps.cache-audit-node-modules.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: cli

      - name: Audit CLI dependencies
        run: npm audit --audit-level=high
        working-directory: cli

  # ── Auto-tag on main branch (triggers release.yml) ───────────────────────
  auto-tag:
    name: Auto-tag release
    needs: [test-cli, lint-cli, build-check-cli, test-bootstrap-scripts, test-bootstrap-scripts-windows, test-gui, audit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: pkg
        run: |
          VERSION=$(node -p "require('./cli/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.pkg.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.pkg.outputs.version }} already exists – skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.pkg.outputs.version }} not found – will create"
          fi

      - name: Create and push version tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.pkg.outputs.version }}" -m "Release v${{ steps.pkg.outputs.version }}"
          git push origin "v${{ steps.pkg.outputs.version }}"

      - name: Trigger release workflow
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GITHUB_TOKEN tag pushes don't trigger other workflows; use workflow_dispatch instead
          gh workflow run release.yml --ref "v${{ steps.pkg.outputs.version }}"
