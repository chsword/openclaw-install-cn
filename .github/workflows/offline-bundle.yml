name: Build Offline Bundle

# Builds a full offline installation bundle for OpenClaw.
# Users can download and install without any internet access.
#
# The bundle mirrors the CDN layout expected by install.sh and install.ps1:
#   openclaw-bundle/
#     cli-manifest.json
#     cli/{cli-ver}/oclaw-{cli-ver}-{os}-{arch}.{ext}
#     manifest.json
#     pkg/{openclaw-ver}/openclaw-{openclaw-ver}-{os}-{arch}.{ext}
#     gui/{installer-ver}/openclaw-gui-*
#     install.sh           ← convenience copy of the bootstrap script
#     install.ps1          ← convenience copy of the bootstrap script
#
# Asset sources in this workflow:
#   1. Current repository GitHub Release:
#      - CLI binaries
#      - GUI installers
#      - install.sh / install.ps1
#   2. openclaw/openclaw official GitHub Release:
#      - OpenClaw application packages
#   3. Workflow-generated metadata:
#      - cli-manifest.json
#      - manifest.json
#      - final offline bundle zip files and checksums
#
# Usage after extracting the downloaded zip:
#   macOS / Linux:
#     export OCLAW_LOCAL_BUNDLE=/path/to/openclaw-bundle
#     bash openclaw-bundle/install.sh
#   Windows (PowerShell):
#     $env:OCLAW_LOCAL_BUNDLE = "C:\path\to\openclaw-bundle"
#     & ".\openclaw-bundle\install.ps1"
#
# Triggered by:
#   1. workflow_dispatch – manual run with optional version overrides
#   2. workflow_run      – auto-runs after a successful installer release or sync-openclaw sync
#
# Version resolution:
#   - Installer version defaults to the latest semver GitHub Release in this repository.
#   - OpenClaw version defaults to the latest version tracked by sync-openclaw
#     in cdn-template/manifest.json, then fetches that exact upstream release.
on:
  workflow_dispatch:
    inputs:
      cli_version:
        description: >
          Installer GitHub Release version to bundle for CLI and GUI (e.g. "1.2.3").
          Leave empty to auto-detect the latest semver release in this repository.
        required: false
        default: ''
      openclaw_version:
        description: >
          OpenClaw version to bundle (e.g. "2026.3.8").
          Leave empty to use the latest version tracked by sync-openclaw.
        required: false
        default: ''
  schedule:
    # Weekly build every Sunday at 02:00 UTC - ensures the pipeline stays healthy.
    - cron: '0 2 * * 0'
  workflow_run:
    workflows: ['Release', 'Sync OpenClaw Upstream Release']
    types: [completed]

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  # ── 1. Download installer release assets ──────────────────────────────────
  download-installer-assets:
    name: Download installer release assets
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    outputs:
      cli_version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}

    steps:
      - name: Determine installer version
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.cli_version }}" ]; then
            VERSION="${{ inputs.cli_version }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100" \
              | python3 -c "import sys,json,re; rels=json.load(sys.stdin); pat=re.compile(r'^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$'); print(next(((r.get('tag_name','')[1:] if r.get('tag_name','').startswith('v') else r.get('tag_name','')) for r in rels if pat.fullmatch(r.get('tag_name',''))), ''))")
            [ -n "$VERSION" ] || { echo "ERROR: Could not detect installer release version from GitHub Releases"; exit 1; }
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Installer version: $VERSION"

      - name: Download installer release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # Pull installer-side files from this repository's GitHub Release,
          # then reshape the CLI binaries into the local-bundle layout expected
          # by install.sh / install.ps1.
          mkdir -p installer-release/raw cli-packages gui-packages bundle-scripts

          RELEASE_JSON=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")

          echo "$RELEASE_JSON" | python3 -c "
          import os, sys, json
          version = os.environ['VERSION']
          assets = {a['name']: a['browser_download_url'] for a in json.load(sys.stdin).get('assets', [])}
          required = {
            'oclaw-win-x64.exe': ['oclaw-win-x64.exe'],
            'oclaw-darwin-x64': ['oclaw-darwin-x64'],
            'oclaw-darwin-arm64': ['oclaw-darwin-arm64'],
            'oclaw-linux-x64': ['oclaw-linux-x64'],
            f'openclaw-gui-setup-{version}-x64.exe': [
              f'openclaw-gui-setup-{version}-x64.exe',
            ],
            f'openclaw-gui-{version}-win-x64.exe': [
              f'openclaw-gui-{version}-win-x64.exe',
              f'openclaw-gui-{version}-win32-x64.exe',
            ],
            f'openclaw-gui-{version}-mac-x64.dmg': [
              f'openclaw-gui-{version}-mac-x64.dmg',
              f'openclaw-gui-{version}-darwin-x64.dmg',
            ],
            f'openclaw-gui-{version}-mac-arm64.dmg': [
              f'openclaw-gui-{version}-mac-arm64.dmg',
              f'openclaw-gui-{version}-darwin-arm64.dmg',
            ],
            f'openclaw-gui-{version}-linux-x64.AppImage': [
              f'openclaw-gui-{version}-linux-x64.AppImage',
              f'openclaw-gui-{version}-linux-x86_64.AppImage',
            ],
            'install.sh': ['install.sh'],
            'install.ps1': ['install.ps1'],
          }
          selected = {}
          missing = []
          for canonical, candidates in required.items():
            match = next((name for name in candidates if name in assets), None)
            if match is None:
              missing.append(canonical)
            else:
              selected[canonical] = assets[match]
          if missing:
              sys.stderr.write('Missing installer release assets:\n')
              for name in missing:
                  sys.stderr.write(f'  - {name}\n')
              sys.exit(1)
          for canonical, url in selected.items():
            print(canonical + '|' + url)
          " > /tmp/installer-assets.txt

          while IFS='|' read -r canonical url; do
            [ -z "$canonical" ] && continue
            echo "  ↓ $canonical"
            curl -fsSL -L \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -o "installer-release/raw/$canonical" \
              "$url"
          done < /tmp/installer-assets.txt

          cp installer-release/raw/install.sh bundle-scripts/install.sh
          cp installer-release/raw/install.ps1 bundle-scripts/install.ps1

          cp installer-release/raw/oclaw-win-x64.exe installer-release/raw/oclaw.exe
          (cd installer-release/raw && zip "$OLDPWD/cli-packages/oclaw-${VERSION}-win32-x64.zip" oclaw.exe)

          cp installer-release/raw/oclaw-darwin-x64 installer-release/raw/oclaw
          chmod +x installer-release/raw/oclaw
          (cd installer-release/raw && tar -czf "$OLDPWD/cli-packages/oclaw-${VERSION}-darwin-x64.tar.gz" oclaw)

          cp installer-release/raw/oclaw-darwin-arm64 installer-release/raw/oclaw
          chmod +x installer-release/raw/oclaw
          (cd installer-release/raw && tar -czf "$OLDPWD/cli-packages/oclaw-${VERSION}-darwin-arm64.tar.gz" oclaw)

          cp installer-release/raw/oclaw-linux-x64 installer-release/raw/oclaw
          chmod +x installer-release/raw/oclaw
          (cd installer-release/raw && tar -czf "$OLDPWD/cli-packages/oclaw-${VERSION}-linux-x64.tar.gz" oclaw)

          cp installer-release/raw/openclaw-gui-setup-${VERSION}-x64.exe gui-packages/
          cp installer-release/raw/openclaw-gui-${VERSION}-win-x64.exe gui-packages/
          cp installer-release/raw/openclaw-gui-${VERSION}-mac-x64.dmg gui-packages/
          cp installer-release/raw/openclaw-gui-${VERSION}-mac-arm64.dmg gui-packages/
          cp installer-release/raw/openclaw-gui-${VERSION}-linux-x64.AppImage gui-packages/

      - name: Generate cli-manifest.json for bundle
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          python3 - <<'PYEOF'
          import json, hashlib, datetime, os

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, 'rb') as f:
                  for chunk in iter(lambda: f.read(65536), b''):
                      h.update(chunk)
              return h.hexdigest()

          version = os.environ['VERSION']
          d = 'cli-packages'
          checksums = {}
          for plat, ext in [
              ('win32-x64', 'zip'),
              ('darwin-x64', 'tar.gz'),
              ('darwin-arm64', 'tar.gz'),
              ('linux-x64', 'tar.gz'),
          ]:
              path = f'{d}/oclaw-{version}-{plat}.{ext}'
              checksums[plat] = 'sha256:' + sha256_file(path) if os.path.exists(path) else 'sha256:UNAVAILABLE'

          manifest = {
              'latest': version,
              'versions': [{
                  'version': version,
                  'releaseDate': datetime.date.today().isoformat(),
                  'files': {
                      'win32-x64': f'oclaw-{version}-win32-x64.zip',
                      'darwin-x64': f'oclaw-{version}-darwin-x64.tar.gz',
                      'darwin-arm64': f'oclaw-{version}-darwin-arm64.tar.gz',
                      'linux-x64': f'oclaw-{version}-linux-x64.tar.gz',
                  },
                  'checksums': checksums,
              }],
          }
          with open(f'{d}/cli-manifest.json', 'w', encoding='utf-8') as f:
              json.dump(manifest, f, indent=2, ensure_ascii=False)
              f.write('\n')
          print(json.dumps(manifest, indent=2, ensure_ascii=False))
          PYEOF

      - name: Upload installer assets artifact
        uses: actions/upload-artifact@v7
        with:
          name: offline-installer-assets
          path: |
            cli-packages/
            gui-packages/
            bundle-scripts/
          retention-days: 1

  # ── 3. Download OpenClaw upstream packages ─────────────────────────────────
  download-openclaw:
    name: Download OpenClaw packages
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    outputs:
      openclaw_version: ${{ steps.detect.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - name: Detect upstream OpenClaw version
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.openclaw_version }}" ]; then
            VERSION="${{ inputs.openclaw_version }}"
            VERSION="${VERSION#v}"
          else
            # Use the version track already published by sync-openclaw, then
            # fetch that exact upstream release from openclaw/openclaw.
            VERSION=$(python3 - <<'PYEOF'
          import json
          from pathlib import Path

          manifest_path = Path('cdn-template/manifest.json')
          if manifest_path.exists():
              try:
                  with manifest_path.open('r', encoding='utf-8') as fh:
                      manifest = json.load(fh)
                  latest = str(manifest.get('latest', '')).strip()
                  if latest:
                      print(latest)
                      raise SystemExit(0)
              except Exception:
                  pass
          print('')
          PYEOF
            )

            if [ -z "$VERSION" ]; then
              echo "::warning::cdn-template/manifest.json does not contain a latest version; falling back to official latest release."
              TAG=$(curl -fsSL \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/openclaw/openclaw/releases/latest" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); tag=d.get('tag_name',''); sys.exit('ERROR: GitHub API response has no tag_name – check openclaw/openclaw releases.') if not tag else None; print(tag)" )
              VERSION="${TAG#v}"
            fi
          fi
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "OpenClaw version: $VERSION"

      - name: Cache upstream OpenClaw assets
        uses: actions/cache@v4
        id: cache-openclaw-assets
        with:
          path: upstream-assets/
          key: openclaw-upstream-${{ steps.detect.outputs.version }}

      - name: Download upstream release assets
        if: steps.cache-openclaw-assets.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG:      ${{ steps.detect.outputs.tag }}
        run: |
          mkdir -p upstream-assets openclaw-packages

          RELEASE_JSON=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/openclaw/openclaw/releases/tags/${TAG}")

          echo "=== Release info ==="
          echo "$RELEASE_JSON" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(f'  name:   {d.get(\"name\",\"\")}')
          print(f'  tag:    {d.get(\"tag_name\",\"\")}')
          print(f'  assets: {len(d.get(\"assets\",[]))}')
          for a in d.get('assets', []):
              print(f'    {a[\"name\"]}  ({a[\"size\"]:,} bytes)')
          "

          echo "$RELEASE_JSON" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for a in d.get('assets', []):
              print(a['name'] + '|' + a['browser_download_url'])
          " > /tmp/asset-list.txt

          echo "=== Downloading assets ==="
          while IFS='|' read -r name url; do
            [ -z "$name" ] && continue
            echo "  ↓ $name"
            curl -fsSL -L \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -o "upstream-assets/$name" \
              "$url"
          done < /tmp/asset-list.txt

          echo "=== upstream-assets/ ==="
          ls -lh upstream-assets/

      - name: Repackage upstream assets into CDN format
        env:
          VERSION: ${{ steps.detect.outputs.version }}
        run: |
          mkdir -p openclaw-packages
          # Helper: find the first matching candidate and convert to CDN target format.
          repackage() {
            local dst="$1"; shift
            for candidate in "$@"; do
              [ -f "upstream-assets/$candidate" ] || continue
              echo "  MATCH  $candidate  →  $(basename "$dst")"
              case "$candidate" in
                *.zip)
                  if [[ "$dst" == *.zip ]];    then cp "upstream-assets/$candidate" "$dst"
                  else tar -czf "$dst" -C upstream-assets "$candidate"; fi ;;
                *.tar.gz|*.tgz)
                  if [[ "$dst" == *.tar.gz ]]; then cp "upstream-assets/$candidate" "$dst"
                  else (cd upstream-assets && zip "../$dst" "$candidate"); fi ;;
                *.dmg|*.AppImage)
                  tar -czf "$dst" -C upstream-assets "$candidate" ;;
                *.exe)
                  (cd upstream-assets && zip "../$dst" "$candidate") ;;
                *)
                  cp "upstream-assets/$candidate" "$dst" ;;
              esac
              return 0
            done
            echo "  SKIP   (no upstream asset matched) → $(basename "$dst")"
            return 1
          }

          V="$VERSION"

          # Normalize upstream asset names to canonical forms
          for f in "upstream-assets/OpenClaw-${V}".dmg "upstream-assets/OpenClaw-${V}"*.dmg; do
            [ -f "$f" ] || continue
            cp "$f" "upstream-assets/openclaw-${V}-mac-universal.dmg"
            echo "  Normalized: $(basename "$f") → openclaw-${V}-mac-universal.dmg"
            break
          done
          for f in "upstream-assets/OpenClaw-${V}"*.zip; do
            [[ "$f" == *dSYM* ]] && continue
            [ -f "$f" ] || continue
            cp "$f" "upstream-assets/openclaw-${V}-mac-universal.zip"
            echo "  Normalized: $(basename "$f") → openclaw-${V}-mac-universal.zip"
            break
          done
          for f in "upstream-assets/OpenClaw-${V}"*win*.exe "upstream-assets/OpenClaw-${V}"*Setup*.exe; do
            [ -f "$f" ] || continue
            cp "$f" "upstream-assets/openclaw-${V}-win32-x64.exe"
            echo "  Normalized: $(basename "$f") → openclaw-${V}-win32-x64.exe"
            break
          done
          for f in "upstream-assets/OpenClaw-${V}"*.AppImage; do
            [ -f "$f" ] || continue
            cp "$f" "upstream-assets/openclaw-${V}-linux-x64.AppImage"
            echo "  Normalized: $(basename "$f") → openclaw-${V}-linux-x64.AppImage"
            break
          done

          # Windows x64
          repackage "openclaw-packages/openclaw-${V}-win32-x64.zip" \
            "openclaw-${V}-win32-x64.zip" \
            "openclaw-${V}-win-x64.zip" \
            "OpenClaw-${V}-win32-x64.zip" \
            "openclaw-${V}-win32-x64.exe" \
            "openclaw-${V}-setup-x64.exe" \
            "openclaw-${V}-setup.exe" \
            "OpenClaw Setup ${V}.exe" || true

          # macOS Intel (x64) – also accepts a universal binary
          repackage "openclaw-packages/openclaw-${V}-darwin-x64.tar.gz" \
            "openclaw-${V}-darwin-x64.tar.gz" \
            "openclaw-${V}-mac-x64.tar.gz" \
            "openclaw-${V}-darwin-x64.dmg" \
            "openclaw-${V}-mac-x64.dmg" \
            "openclaw-${V}-x64.dmg" \
            "openclaw-${V}-mac-universal.dmg" \
            "openclaw-${V}-mac-universal.zip" || true

          # macOS Apple Silicon (arm64) – also accepts a universal binary
          repackage "openclaw-packages/openclaw-${V}-darwin-arm64.tar.gz" \
            "openclaw-${V}-darwin-arm64.tar.gz" \
            "openclaw-${V}-mac-arm64.tar.gz" \
            "openclaw-${V}-darwin-arm64.dmg" \
            "openclaw-${V}-mac-arm64.dmg" \
            "openclaw-${V}-arm64.dmg" \
            "openclaw-${V}-mac-universal.dmg" \
            "openclaw-${V}-mac-universal.zip" || true

          # Linux x64
          repackage "openclaw-packages/openclaw-${V}-linux-x64.tar.gz" \
            "openclaw-${V}-linux-x64.tar.gz" \
            "openclaw-${V}-linux-amd64.tar.gz" \
            "openclaw-${V}-linux-x64.AppImage" \
            "openclaw-${V}-x64.AppImage" \
            "openclaw-${V}-amd64.AppImage" || true

          echo "=== openclaw-packages/ ==="
          ls -lh openclaw-packages/ || echo "  (empty)"

      - name: Generate manifest.json for bundle
        env:
          VERSION: ${{ steps.detect.outputs.version }}
        run: |
          python3 - <<'PYEOF'
          import json, os, hashlib, datetime

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, 'rb') as f:
                  for chunk in iter(lambda: f.read(65536), b''):
                      h.update(chunk)
              return h.hexdigest()

          def checksum_for(path):
              if os.path.exists(path):
                  return 'sha256:' + sha256_file(path)
              return 'sha256:UNAVAILABLE'

          version = os.environ['VERSION']
          d = 'openclaw-packages'
          checksums = {
              'win32-x64':    checksum_for(f'{d}/openclaw-{version}-win32-x64.zip'),
              'darwin-x64':   checksum_for(f'{d}/openclaw-{version}-darwin-x64.tar.gz'),
              'darwin-arm64': checksum_for(f'{d}/openclaw-{version}-darwin-arm64.tar.gz'),
              'linux-x64':    checksum_for(f'{d}/openclaw-{version}-linux-x64.tar.gz'),
          }
          manifest = {
              'latest': version,
              'versions': [{
                  'version':     version,
                  'releaseDate': datetime.date.today().isoformat(),
                  'description': f'OpenClaw {version}',
                  'files': {
                      'win32-x64':    f'openclaw-{version}-win32-x64.zip',
                      'darwin-x64':   f'openclaw-{version}-darwin-x64.tar.gz',
                      'darwin-arm64': f'openclaw-{version}-darwin-arm64.tar.gz',
                      'linux-x64':    f'openclaw-{version}-linux-x64.tar.gz',
                  },
                  'checksums': checksums,
              }]
          }
          with open(f'{d}/manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2, ensure_ascii=False)
              f.write('\n')
          print(json.dumps(manifest, indent=2))
          PYEOF

      - name: Upload OpenClaw packages artifact
        uses: actions/upload-artifact@v7
        with:
          name: offline-openclaw-packages
          path: openclaw-packages/
          retention-days: 1

  # ── 4. Assemble and publish the offline bundle ──────────────────────────────
  assemble-bundle:
    name: Assemble and publish offline bundle
    needs: [download-installer-assets, download-openclaw]
    runs-on: ubuntu-latest

    steps:
      - name: Download installer assets artifact
        uses: actions/download-artifact@v8
        with:
          name: offline-installer-assets
          path: installer-assets/

      - name: Download OpenClaw packages artifact
        uses: actions/download-artifact@v8
        with:
          name: offline-openclaw-packages
          path: openclaw-packages/

      - name: Assemble full offline bundle directory
        env:
          CLI_VERSION:      ${{ needs.download-installer-assets.outputs.cli_version }}
          OPENCLAW_VERSION: ${{ needs.download-openclaw.outputs.openclaw_version }}
        run: |
          CLI_VER="$CLI_VERSION"
          OC_VER="$OPENCLAW_VERSION"
          BUNDLE="openclaw-bundle"

          mkdir -p "$BUNDLE/cli/${CLI_VER}" "$BUNDLE/pkg/${OC_VER}" "$BUNDLE/gui/${CLI_VER}"

          # CLI manifest and packages
          cp installer-assets/cli-packages/cli-manifest.json "$BUNDLE/cli-manifest.json"
          for f in installer-assets/cli-packages/oclaw-*.zip installer-assets/cli-packages/oclaw-*.tar.gz; do
            [ -f "$f" ] && cp "$f" "$BUNDLE/cli/${CLI_VER}/"
          done

          # OpenClaw manifest and packages
          cp openclaw-packages/manifest.json "$BUNDLE/manifest.json"
          for f in openclaw-packages/openclaw-*.zip openclaw-packages/openclaw-*.tar.gz; do
            [ -f "$f" ] && cp "$f" "$BUNDLE/pkg/${OC_VER}/"
          done

          # GUI installers
          find installer-assets/gui-packages/ -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" \) | while read -r f; do
            cp "$f" "$BUNDLE/gui/${CLI_VER}/"
          done

          # Bootstrap scripts (convenience copies so users can install from within the bundle)
          cp installer-assets/bundle-scripts/install.sh  "$BUNDLE/"
          cp installer-assets/bundle-scripts/install.ps1 "$BUNDLE/"

          echo "=== Full bundle structure ==="
          find "$BUNDLE" -type f | sort | xargs ls -lh

      - name: Create per-platform offline bundle archives
        env:
          CLI_VERSION:      ${{ needs.download-installer-assets.outputs.cli_version }}
          OPENCLAW_VERSION: ${{ needs.download-openclaw.outputs.openclaw_version }}
        run: |
          CLI_VER="$CLI_VERSION"
          OC_VER="$OPENCLAW_VERSION"

          for plat in win32-x64 darwin-x64 darwin-arm64 linux-x64; do
            PLAT_BUNDLE="openclaw-bundle-${plat}"
            mkdir -p "$PLAT_BUNDLE/cli/${CLI_VER}" "$PLAT_BUNDLE/pkg/${OC_VER}" "$PLAT_BUNDLE/gui/${CLI_VER}"

            # Shared files
            cp openclaw-bundle/cli-manifest.json "$PLAT_BUNDLE/"
            cp openclaw-bundle/manifest.json     "$PLAT_BUNDLE/"
            cp openclaw-bundle/install.sh        "$PLAT_BUNDLE/" 2>/dev/null || true
            cp openclaw-bundle/install.ps1       "$PLAT_BUNDLE/" 2>/dev/null || true

            # Platform-specific CLI package
            case "$plat" in
              win32-x64)    cli_pkg="oclaw-${CLI_VER}-win32-x64.zip" ;;
              darwin-x64)   cli_pkg="oclaw-${CLI_VER}-darwin-x64.tar.gz" ;;
              darwin-arm64) cli_pkg="oclaw-${CLI_VER}-darwin-arm64.tar.gz" ;;
              linux-x64)    cli_pkg="oclaw-${CLI_VER}-linux-x64.tar.gz" ;;
            esac
            src="openclaw-bundle/cli/${CLI_VER}/${cli_pkg}"
            [ -f "$src" ] && cp "$src" "$PLAT_BUNDLE/cli/${CLI_VER}/" \
              || echo "WARNING: CLI package not found: $src"

            # Platform-specific OpenClaw package
            case "$plat" in
              win32-x64)    oc_pkg="openclaw-${OC_VER}-win32-x64.zip" ;;
              darwin-x64)   oc_pkg="openclaw-${OC_VER}-darwin-x64.tar.gz" ;;
              darwin-arm64) oc_pkg="openclaw-${OC_VER}-darwin-arm64.tar.gz" ;;
              linux-x64)    oc_pkg="openclaw-${OC_VER}-linux-x64.tar.gz" ;;
            esac
            src="openclaw-bundle/pkg/${OC_VER}/${oc_pkg}"
            [ -f "$src" ] && cp "$src" "$PLAT_BUNDLE/pkg/${OC_VER}/" \
              || echo "WARNING: OpenClaw package not found: $src"

            # Platform-specific GUI installer(s)
            case "$plat" in
              win32-x64)
                for gui_src in \
                  "openclaw-bundle/gui/${CLI_VER}/openclaw-gui-setup-${CLI_VER}-x64.exe" \
                  "openclaw-bundle/gui/${CLI_VER}/openclaw-gui-${CLI_VER}-win-x64.exe"; do
                  [ -f "$gui_src" ] && cp "$gui_src" "$PLAT_BUNDLE/gui/${CLI_VER}/" \
                    || echo "WARNING: GUI installer not found: $gui_src"
                done
                ;;
              darwin-x64)
                gui_src="openclaw-bundle/gui/${CLI_VER}/openclaw-gui-${CLI_VER}-mac-x64.dmg"
                [ -f "$gui_src" ] && cp "$gui_src" "$PLAT_BUNDLE/gui/${CLI_VER}/" \
                  || echo "WARNING: GUI installer not found: $gui_src"
                ;;
              darwin-arm64)
                gui_src="openclaw-bundle/gui/${CLI_VER}/openclaw-gui-${CLI_VER}-mac-arm64.dmg"
                [ -f "$gui_src" ] && cp "$gui_src" "$PLAT_BUNDLE/gui/${CLI_VER}/" \
                  || echo "WARNING: GUI installer not found: $gui_src"
                ;;
              linux-x64)
                gui_src="openclaw-bundle/gui/${CLI_VER}/openclaw-gui-${CLI_VER}-linux-x64.AppImage"
                [ -f "$gui_src" ] && cp "$gui_src" "$PLAT_BUNDLE/gui/${CLI_VER}/" \
                  || echo "WARNING: GUI installer not found: $gui_src"
                ;;
            esac

            echo "=== $plat bundle ==="
            find "$PLAT_BUNDLE" -type f | sort

            # Pack into a zip for easy download
            zip -r "openclaw-offline-bundle-${CLI_VER}-${plat}.zip" "$PLAT_BUNDLE/"
            echo "Created: openclaw-offline-bundle-${CLI_VER}-${plat}.zip ($(du -sh "openclaw-offline-bundle-${CLI_VER}-${plat}.zip" | cut -f1))"
          done

          # Full all-platform bundle
          zip -r "openclaw-offline-bundle-${CLI_VER}-all-platforms.zip" "openclaw-bundle/"
          echo "Created: openclaw-offline-bundle-${CLI_VER}-all-platforms.zip ($(du -sh "openclaw-offline-bundle-${CLI_VER}-all-platforms.zip" | cut -f1))"

          echo "=== All bundle archives ==="
          ls -lh openclaw-offline-bundle-*.zip

      - name: Generate SHA-256 checksums for bundle archives
        run: |
          sha256sum openclaw-offline-bundle-*.zip > bundle-checksums.sha256
          echo "=== checksums ==="
          cat bundle-checksums.sha256

      - name: Validate offline bundle archives
        env:
          CLI_VERSION:      ${{ needs.download-installer-assets.outputs.cli_version }}
          OPENCLAW_VERSION: ${{ needs.download-openclaw.outputs.openclaw_version }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys

          cli_ver = os.environ['CLI_VERSION']
          oc_ver = os.environ['OPENCLAW_VERSION']
          platforms = ['win32-x64', 'darwin-x64', 'darwin-arm64', 'linux-x64']
          errors = []

          # 1. Verify all per-platform bundle archives exist and are > 1 MB
          print('=== Checking per-platform bundle archives ===')
          for plat in platforms:
              fname = f'openclaw-offline-bundle-{cli_ver}-{plat}.zip'
              if not os.path.exists(fname):
                  errors.append(f'MISSING bundle archive: {fname}')
                  continue
              size = os.path.getsize(fname)
              if size < 1024 * 1024:
                  errors.append(f'Bundle too small ({size:,} bytes < 1 MB): {fname}')
              else:
                  print(f'  OK  {fname}  ({size:,} bytes)')

          # 2. Verify manifest.json structure and version
          print('\n=== Checking manifest.json ===')
          manifest_path = 'openclaw-bundle/manifest.json'
          if not os.path.exists(manifest_path):
              errors.append(f'MISSING: {manifest_path}')
          else:
              with open(manifest_path) as fh:
                  manifest = json.load(fh)
              if manifest.get('latest') != oc_ver:
                  errors.append(
                      f'manifest.json: latest="{manifest.get("latest")}" '
                      f'!= expected "{oc_ver}"'
                  )
              else:
                  print(f'  OK  latest = {oc_ver}')
              versions = manifest.get('versions', [])
              if not versions:
                  errors.append('manifest.json: "versions" array is empty')
              else:
                  checksums = versions[0].get('checksums', {})
                  for plat in platforms:
                      cs = checksums.get(plat, '')
                      if not cs.startswith('sha256:'):
                          errors.append(
                              f'manifest.json: missing/invalid checksum for {plat}: "{cs}"'
                          )
                      elif cs == 'sha256:UNAVAILABLE':
                          print(f'  WARN  checksum for {plat}: UNAVAILABLE '
                                f'(upstream package not published)')
                      else:
                          print(f'  OK  checksum for {plat}: {cs[:16]}...')

          # 3. Verify cli-manifest.json structure and version
          print('\n=== Checking cli-manifest.json ===')
          cli_manifest_path = 'openclaw-bundle/cli-manifest.json'
          if not os.path.exists(cli_manifest_path):
              errors.append(f'MISSING: {cli_manifest_path}')
          else:
              with open(cli_manifest_path) as fh:
                  cli_manifest = json.load(fh)
              if cli_manifest.get('latest') != cli_ver:
                  errors.append(
                      f'cli-manifest.json: latest="{cli_manifest.get("latest")}" '
                      f'!= expected "{cli_ver}"'
                  )
              else:
                  print(f'  OK  latest = {cli_ver}')
              cli_versions = cli_manifest.get('versions', [])
              if not cli_versions:
                  errors.append('cli-manifest.json: "versions" array is empty')
              else:
                  cli_checksums = cli_versions[0].get('checksums', {})
                  for plat in platforms:
                      cs = cli_checksums.get(plat, '')
                      if not cs.startswith('sha256:') or cs == 'sha256:UNAVAILABLE':
                          errors.append(
                              f'cli-manifest.json: missing/invalid checksum for {plat}: "{cs}"'
                          )
                      else:
                          print(f'  OK  checksum for {plat}: {cs[:16]}...')

          # Summary
          if errors:
              print('\n=== VALIDATION FAILED ===')
              for e in errors:
                  print(f'  ERROR: {e}')
              sys.exit(1)
          else:
              print('\n=== Bundle validation PASSED ===')
          PYEOF

      - name: Validate bundled GUI installers
        env:
          CLI_VERSION: ${{ needs.download-installer-assets.outputs.cli_version }}
        run: |
          python3 - <<'PYEOF'
          import os
          import sys

          cli_ver = os.environ['CLI_VERSION']
          base = os.path.join('openclaw-bundle', 'gui', cli_ver)
          expected = [
              f'openclaw-gui-setup-{cli_ver}-x64.exe',
              f'openclaw-gui-{cli_ver}-win-x64.exe',
              f'openclaw-gui-{cli_ver}-mac-x64.dmg',
              f'openclaw-gui-{cli_ver}-mac-arm64.dmg',
              f'openclaw-gui-{cli_ver}-linux-x64.AppImage',
          ]

          missing = [name for name in expected if not os.path.exists(os.path.join(base, name))]
          if missing:
              print('Missing GUI installers from offline bundle:')
              for name in missing:
                  print(f'  - {name}')
              sys.exit(1)

          print('All expected GUI installers are present in the offline bundle.')
          PYEOF

      - name: Create GitHub Release with offline bundles
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: offline-${{ needs.download-installer-assets.outputs.cli_version }}-oc${{ needs.download-openclaw.outputs.openclaw_version }}
          name: "离线安装包 | CLI ${{ needs.download-installer-assets.outputs.cli_version }} + OpenClaw ${{ needs.download-openclaw.outputs.openclaw_version }}"
          body: |
            ## 全量离线安装包

            本离线包包含安装所需的完整文件集，**无需联网**即可完成 OpenClaw 安装。

            文件来源分为三部分：

            - 当前仓库的 installer GitHub Release：CLI、GUI、安装脚本
            - openclaw/openclaw 官方 GitHub Release：OpenClaw 主程序包
            - 本工作流运行时生成：bundle 内部 manifest 与校验和

            ### 📦 包内组件

            | 组件 | 版本 |
            |------|------|
            | oclaw CLI（安装工具）| `${{ needs.download-installer-assets.outputs.cli_version }}` |
            | OpenClaw GUI（图形安装器）| `${{ needs.download-installer-assets.outputs.cli_version }}` |
            | OpenClaw（主程序）| `${{ needs.download-openclaw.outputs.openclaw_version }}` |

            ### 📁 资产来源

            | 内容 | 来源 |
            |------|------|
            | `cli/*` | 当前仓库 installer GitHub Release 附件二次打包 |
            | `gui/*` | 当前仓库 installer GitHub Release 附件 |
            | `pkg/*` | `openclaw/openclaw` 官方 GitHub Release 附件二次打包 |
            | `cli-manifest.json` / `manifest.json` | 本工作流按最终 bundle 内容重新生成 |
            | `install.sh` / `install.ps1` | 当前仓库 installer GitHub Release 附件 |

            ### 📥 下载说明

            根据您的操作系统下载对应的离线包：

            | 文件 | 适用平台 |
            |------|----------|
            | `openclaw-offline-bundle-*-win32-x64.zip` | Windows x64 |
            | `openclaw-offline-bundle-*-darwin-x64.zip` | macOS Intel (x64) |
            | `openclaw-offline-bundle-*-darwin-arm64.zip` | macOS Apple Silicon (arm64) |
            | `openclaw-offline-bundle-*-linux-x64.zip` | Linux x64 |
            | `openclaw-offline-bundle-*-all-platforms.zip` | 全平台（含所有文件） |

            ### 🚀 安装步骤

            > ⚠️ **前提：** 使用脚本离线安装时，仍需预先安装 [Node.js](https://nodejs.org/) >= 18。

            每个离线包同时包含：
            - 可直接运行的 GUI 安装器
            - 可供 `install.sh` / `install.ps1` 使用的本地离线 bundle 目录
            - 与 bundle 实际内容一致的离线 manifest 和校验和

            **macOS / Linux：**
            ```bash
            # 解压（以 Linux 为例）
            unzip openclaw-offline-bundle-*-linux-x64.zip

            # 指定本地离线包目录
            export OCLAW_LOCAL_BUNDLE="$(pwd)/openclaw-bundle-linux-x64"

            # 运行安装脚本
            bash openclaw-bundle-linux-x64/install.sh
            ```

            **Windows（PowerShell）：**
            ```powershell
            # 解压
            Expand-Archive openclaw-offline-bundle-*-win32-x64.zip .

            # 指定本地离线包目录
            $env:OCLAW_LOCAL_BUNDLE = "$PWD\openclaw-bundle-win32-x64"

            # 运行安装脚本
            & ".\openclaw-bundle-win32-x64\install.ps1"
            ```

            ### 🔒 校验和

            见附件 `bundle-checksums.sha256`
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            openclaw-offline-bundle-*.zip
            bundle-checksums.sha256
