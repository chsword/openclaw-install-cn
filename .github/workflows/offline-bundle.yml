name: Build Offline Bundle

# Builds a Windows-only offline installation bundle for OpenClaw.
#
# Offline here means: OpenClaw itself can be installed without network access.
# The installer-side tools (oclaw / GUI) are shipped as portable executables
# placed directly in the folder rather than being installed separately.
#
# Final bundle layout:
#   openclaw-bundle-win32-x64/
#     manifest.json
#     install.ps1
#     oclaw-win-x64.exe
#     openclaw-gui-{installer-ver}-win32-x64.exe
#     {openclaw-ver}/openclaw-{openclaw-ver}-win32-x64.zip
#
# Asset sources in this workflow:
#   1. Current repository GitHub Release:
#      - oclaw Windows executable
#      - OpenClaw GUI portable executable
#      - install.ps1
#   2. openclaw/openclaw official GitHub Release:
#      - OpenClaw application packages
#   3. Workflow-generated metadata:
#      - final offline bundle zip files and checksums
#
# Usage after extracting the downloaded zip:
#   Windows (PowerShell):
#     $env:OCLAW_LOCAL_BUNDLE = "$PWD\openclaw-bundle-win32-x64"
#     & ".\openclaw-bundle-win32-x64\install.ps1"
#
# Triggered by:
#   1. workflow_dispatch – manual run with optional version overrides
#   2. workflow_run      – auto-runs after a successful installer release or sync-openclaw sync
#
# Version resolution:
#   - Installer version defaults to the latest semver GitHub Release in this repository.
#   - OpenClaw version defaults to the latest version published on CDN by
#     sync-openclaw, then fetches that exact upstream release.
on:
  workflow_dispatch:
    inputs:
      cli_version:
        description: >
          Installer GitHub Release version to bundle for CLI and GUI (e.g. "1.2.3").
          Leave empty to auto-detect the latest semver release in this repository.
        required: false
        default: ''
      openclaw_version:
        description: >
          OpenClaw version to bundle (e.g. "2026.3.8").
          Leave empty to use the latest version tracked by sync-openclaw.
        required: false
        default: ''
  schedule:
    # Weekly build every Sunday at 02:00 UTC - ensures the pipeline stays healthy.
    - cron: '0 2 * * 0'
  workflow_run:
    workflows: ['Release', 'Sync OpenClaw Upstream Release']
    types: [completed]

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  # ── 1. Download installer release assets ──────────────────────────────────
  download-installer-assets:
    name: Download installer release assets
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    outputs:
      cli_version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}

    steps:
      - name: Determine installer version
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.cli_version }}" ]; then
            VERSION="${{ inputs.cli_version }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100" \
              | python3 -c "import sys,json,re; rels=json.load(sys.stdin); pat=re.compile(r'^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$'); print(next(((r.get('tag_name','')[1:] if r.get('tag_name','').startswith('v') else r.get('tag_name','')) for r in rels if pat.fullmatch(r.get('tag_name',''))), ''))")
            [ -n "$VERSION" ] || { echo "ERROR: Could not detect installer release version from GitHub Releases"; exit 1; }
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Installer version: $VERSION"

      - name: Download installer release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # Pull only the Windows portable executables needed for the bundle.
          mkdir -p installer-release/raw portable-files bundle-scripts

          RELEASE_JSON=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")

          echo "$RELEASE_JSON" | python3 -c "
          import os, sys, json
          version = os.environ['VERSION']
          assets = {a['name']: a['browser_download_url'] for a in json.load(sys.stdin).get('assets', [])}
          required = {
            'oclaw-win-x64.exe': ['oclaw-win-x64.exe'],
            f'openclaw-gui-{version}-win32-x64.exe': [
              f'openclaw-gui-{version}-win32-x64.exe',
              f'openclaw-gui-{version}-win-x64.exe',
            ],
            'install.ps1': ['install.ps1'],
          }
          selected = {}
          missing = []
          for canonical, candidates in required.items():
            match = next((name for name in candidates if name in assets), None)
            if match is None:
              missing.append(canonical)
            else:
              selected[canonical] = assets[match]
          if missing:
              sys.stderr.write('Missing installer release assets:\n')
              for name in missing:
                  sys.stderr.write(f'  - {name}\n')
              sys.exit(1)
          for canonical, url in selected.items():
            print(canonical + '|' + url)
          " > /tmp/installer-assets.txt

          while IFS='|' read -r canonical url; do
            [ -z "$canonical" ] && continue
            echo "  ↓ $canonical"
            curl -fsSL -L \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -o "installer-release/raw/$canonical" \
              "$url"
          done < /tmp/installer-assets.txt

          cp installer-release/raw/install.ps1 bundle-scripts/install.ps1
          cp installer-release/raw/oclaw-win-x64.exe portable-files/
          cp installer-release/raw/openclaw-gui-${VERSION}-win32-x64.exe portable-files/

      - name: Upload installer assets artifact
        uses: actions/upload-artifact@v7
        with:
          name: offline-installer-assets
          path: |
            portable-files/
            bundle-scripts/
          retention-days: 1

  # ── 3. Download OpenClaw upstream packages ─────────────────────────────────
  download-openclaw:
    name: Download OpenClaw packages
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    outputs:
      openclaw_version: ${{ steps.detect.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - name: Detect upstream OpenClaw version
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.openclaw_version }}" ]; then
            VERSION="${{ inputs.openclaw_version }}"
            VERSION="${VERSION#v}"
          else
            # Use the version track already published on CDN by sync-openclaw,
            # then fetch that exact upstream release from openclaw/openclaw.
            VERSION=$(curl -fsSL https://oclaw.chatu.plus/manifest.json \
              | python3 -c "import sys,json; data=json.load(sys.stdin); print(str(data.get('latest','')).strip())")

            if [ -z "$VERSION" ]; then
              echo "::warning::CDN manifest does not contain a latest version; falling back to repository manifest, then official latest release."
              VERSION=$(python3 -c "import json,pathlib; p=pathlib.Path('cdn-template/manifest.json'); data=json.loads(p.read_text(encoding='utf-8')) if p.exists() else {}; print(str(data.get('latest','')).strip())")
            fi

            if [ -z "$VERSION" ]; then
              TAG=$(curl -fsSL \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/openclaw/openclaw/releases/latest" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); tag=d.get('tag_name',''); sys.exit('ERROR: GitHub API response has no tag_name – check openclaw/openclaw releases.') if not tag else None; print(tag)" )
              VERSION="${TAG#v}"
            fi
          fi
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "OpenClaw version: $VERSION"

      - name: Download CDN manifest.json
        env:
          VERSION: ${{ steps.detect.outputs.version }}
        run: |
          mkdir -p openclaw-packages
          curl -fsSL https://oclaw.chatu.plus/manifest.json -o openclaw-packages/manifest.json || cp cdn-template/manifest.json openclaw-packages/manifest.json

          python3 - <<'PYEOF'
          import json, os, sys

          version = os.environ['VERSION']
          with open('openclaw-packages/manifest.json', 'r', encoding='utf-8') as fh:
              manifest = json.load(fh)

          versions = {entry.get('version'): entry for entry in manifest.get('versions', [])}
          if version not in versions:
              print(f'ERROR: version {version} not found in CDN manifest.json', file=sys.stderr)
              sys.exit(1)

          print(f'CDN manifest latest: {manifest.get("latest", "")}')
          print(f'Using version entry: {version}')
          print(json.dumps(versions[version], indent=2, ensure_ascii=False))
          PYEOF

      - name: Cache upstream OpenClaw assets
        uses: actions/cache@v4
        id: cache-openclaw-assets
        with:
          path: upstream-assets/
          key: openclaw-upstream-${{ steps.detect.outputs.version }}

      - name: Download upstream release assets
        if: steps.cache-openclaw-assets.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG:      ${{ steps.detect.outputs.tag }}
        run: |
          mkdir -p upstream-assets openclaw-packages

          RELEASE_JSON=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/openclaw/openclaw/releases/tags/${TAG}")

          echo "=== Release info ==="
          echo "$RELEASE_JSON" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(f'  name:   {d.get(\"name\",\"\")}')
          print(f'  tag:    {d.get(\"tag_name\",\"\")}')
          print(f'  assets: {len(d.get(\"assets\",[]))}')
          for a in d.get('assets', []):
              print(f'    {a[\"name\"]}  ({a[\"size\"]:,} bytes)')
          "

          echo "$RELEASE_JSON" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for a in d.get('assets', []):
              print(a['name'] + '|' + a['browser_download_url'])
          " > /tmp/asset-list.txt

          echo "=== Downloading assets ==="
          while IFS='|' read -r name url; do
            [ -z "$name" ] && continue
            echo "  ↓ $name"
            curl -fsSL -L \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -o "upstream-assets/$name" \
              "$url"
          done < /tmp/asset-list.txt

          echo "=== upstream-assets/ ==="
          ls -lh upstream-assets/

      - name: Repackage upstream assets into CDN format
        env:
          VERSION: ${{ steps.detect.outputs.version }}
        run: |
          mkdir -p openclaw-packages
          # Helper: find the first matching candidate and convert to CDN target format.
          repackage() {
            local dst="$1"; shift
            for candidate in "$@"; do
              [ -f "upstream-assets/$candidate" ] || continue
              echo "  MATCH  $candidate  →  $(basename "$dst")"
              case "$candidate" in
                *.zip)
                  if [[ "$dst" == *.zip ]];    then cp "upstream-assets/$candidate" "$dst"
                  else tar -czf "$dst" -C upstream-assets "$candidate"; fi ;;
                *.tar.gz|*.tgz)
                  if [[ "$dst" == *.tar.gz ]]; then cp "upstream-assets/$candidate" "$dst"
                  else (cd upstream-assets && zip "../$dst" "$candidate"); fi ;;
                *.dmg|*.AppImage)
                  tar -czf "$dst" -C upstream-assets "$candidate" ;;
                *.exe)
                  (cd upstream-assets && zip "../$dst" "$candidate") ;;
                *)
                  cp "upstream-assets/$candidate" "$dst" ;;
              esac
              return 0
            done
            echo "  SKIP   (no upstream asset matched) → $(basename "$dst")"
            return 1
          }

          V="$VERSION"

          for f in "upstream-assets/OpenClaw-${V}"*win*.exe "upstream-assets/OpenClaw-${V}"*Setup*.exe; do
            [ -f "$f" ] || continue
            cp "$f" "upstream-assets/openclaw-${V}-win32-x64.exe"
            echo "  Normalized: $(basename "$f") → openclaw-${V}-win32-x64.exe"
            break
          done

          # Windows x64
          repackage "openclaw-packages/openclaw-${V}-win32-x64.zip" \
            "openclaw-${V}-win32-x64.zip" \
            "openclaw-${V}-win-x64.zip" \
            "OpenClaw-${V}-win32-x64.zip" \
            "openclaw-${V}-win32-x64.exe" \
            "openclaw-${V}-setup-x64.exe" \
            "openclaw-${V}-setup.exe" \
            "OpenClaw Setup ${V}.exe" || true

          echo "=== openclaw-packages/ ==="
          ls -lh openclaw-packages/ || echo "  (empty)"

      - name: Upload OpenClaw packages artifact
        uses: actions/upload-artifact@v7
        with:
          name: offline-openclaw-packages
          path: |
            openclaw-packages/manifest.json
            openclaw-packages/openclaw-*.zip
          retention-days: 1

  # ── 4. Assemble and publish the offline bundle ──────────────────────────────
  assemble-bundle:
    name: Assemble and publish offline bundle
    needs: [download-installer-assets, download-openclaw]
    runs-on: ubuntu-latest

    steps:
      - name: Download installer assets artifact
        uses: actions/download-artifact@v8
        with:
          name: offline-installer-assets
          path: installer-assets/

      - name: Download OpenClaw packages artifact
        uses: actions/download-artifact@v8
        with:
          name: offline-openclaw-packages
          path: openclaw-packages/

      - name: Assemble full offline bundle directory
        env:
          CLI_VERSION:      ${{ needs.download-installer-assets.outputs.cli_version }}
          OPENCLAW_VERSION: ${{ needs.download-openclaw.outputs.openclaw_version }}
        run: |
          CLI_VER="$CLI_VERSION"
          OC_VER="$OPENCLAW_VERSION"
          BUNDLE="openclaw-bundle-win32-x64"

          mkdir -p "$BUNDLE/${OC_VER}"

          # OpenClaw manifest and packages
          cp openclaw-packages/manifest.json "$BUNDLE/manifest.json"
          for f in openclaw-packages/openclaw-*.zip; do
            [ -f "$f" ] && cp "$f" "$BUNDLE/${OC_VER}/"
          done

          cp installer-assets/portable-files/oclaw-win-x64.exe "$BUNDLE/"
          cp installer-assets/portable-files/openclaw-gui-${CLI_VER}-win32-x64.exe "$BUNDLE/"

          # Bootstrap script for offline OpenClaw installation.
          cp installer-assets/bundle-scripts/install.ps1 "$BUNDLE/"

          echo "=== Full bundle structure ==="
          find "$BUNDLE" -type f | sort | xargs ls -lh

      - name: Create Windows offline bundle archive
        env:
          CLI_VERSION:      ${{ needs.download-installer-assets.outputs.cli_version }}
          OPENCLAW_VERSION: ${{ needs.download-openclaw.outputs.openclaw_version }}
        run: |
          CLI_VER="$CLI_VERSION"
          OC_VER="$OPENCLAW_VERSION"
          BUNDLE="openclaw-bundle-win32-x64"
          PKG="openclaw-${OC_VER}-win32-x64.zip"

          [ -f "$BUNDLE/${OC_VER}/${PKG}" ] || { echo "ERROR: Missing Windows OpenClaw package: $BUNDLE/${OC_VER}/${PKG}"; exit 1; }

          zip -r "openclaw-offline-bundle-${CLI_VER}-win32-x64.zip" "$BUNDLE/"
          echo "Created: openclaw-offline-bundle-${CLI_VER}-win32-x64.zip ($(du -sh "openclaw-offline-bundle-${CLI_VER}-win32-x64.zip" | cut -f1))"

          echo "=== All bundle archives ==="
          ls -lh openclaw-offline-bundle-*.zip

      - name: Generate SHA-256 checksums for bundle archives
        run: |
          sha256sum openclaw-offline-bundle-*.zip > bundle-checksums.sha256
          echo "=== checksums ==="
          cat bundle-checksums.sha256

      - name: Validate offline bundle archives
        env:
          CLI_VERSION:      ${{ needs.download-installer-assets.outputs.cli_version }}
          OPENCLAW_VERSION: ${{ needs.download-openclaw.outputs.openclaw_version }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys

          cli_ver = os.environ['CLI_VERSION']
          oc_ver = os.environ['OPENCLAW_VERSION']
          errors = []

            # 1. Verify manifest.json structure and Windows package availability
          print('=== Checking manifest.json ===')
            manifest_path = 'openclaw-bundle-win32-x64/manifest.json'
          if not os.path.exists(manifest_path):
              errors.append(f'MISSING: {manifest_path}')
          else:
              with open(manifest_path) as fh:
                  manifest = json.load(fh)
              if manifest.get('latest') != oc_ver:
                  errors.append(
                      f'manifest.json: latest="{manifest.get("latest")}" '
                      f'!= expected "{oc_ver}"'
                  )
              else:
                  print(f'  OK  latest = {oc_ver}')

              versions = manifest.get('versions', [])
              if not versions:
                  errors.append('manifest.json: "versions" array is empty')
              else:
                  version_info = next((entry for entry in versions if entry.get('version') == oc_ver), versions[0])
                  cs = version_info.get('checksums', {}).get('win32-x64', '')
                  if not cs.startswith('sha256:'):
                    errors.append(f'manifest.json: missing/invalid checksum for win32-x64: "{cs}"')
                  elif cs == 'sha256:UNAVAILABLE':
                    errors.append(f'manifest.json: win32-x64 package is unavailable for {oc_ver}')
                  else:
                    print(f'  OK  checksum for win32-x64: {cs[:16]}...')

              # 2. Verify the emitted Windows bundle archive exists and is > 1 MB
              print('\n=== Checking Windows bundle archive ===')
              fname = f'openclaw-offline-bundle-{cli_ver}-win32-x64.zip'
              if not os.path.exists(fname):
                errors.append(f'MISSING bundle archive: {fname}')
              else:
                size = os.path.getsize(fname)
                if size < 1024 * 1024:
                  errors.append(f'Bundle too small ({size:,} bytes < 1 MB): {fname}')
                else:
                  print(f'  OK  {fname}  ({size:,} bytes)')

              # 3. Verify the Windows bundle contents
              print('\n=== Checking Windows bundle contents ===')
              base = 'openclaw-bundle-win32-x64'
              required = [
                'manifest.json',
                'install.ps1',
                'oclaw-win-x64.exe',
                f'openclaw-gui-{cli_ver}-win32-x64.exe',
                f'{oc_ver}/openclaw-{oc_ver}-win32-x64.zip',
              ]
              for rel in required:
                path = os.path.join(base, rel)
                if not os.path.exists(path):
                  errors.append(f'MISSING: {path}')
                else:
                  print(f'  OK  {path}')

          # Summary
          if errors:
              print('\n=== VALIDATION FAILED ===')
              for e in errors:
                  print(f'  ERROR: {e}')
              sys.exit(1)
          else:
              print('\n=== Bundle validation PASSED ===')
          PYEOF

      - name: Validate bundled GUI installers
        env:
          CLI_VERSION: ${{ needs.download-installer-assets.outputs.cli_version }}
        run: |
          python3 - <<'PYEOF'
          import os
          import sys

          cli_ver = os.environ['CLI_VERSION']
            base = 'openclaw-bundle-win32-x64'
          expected = [
              f'openclaw-gui-{cli_ver}-win32-x64.exe',
              'oclaw-win-x64.exe',
          ]

          missing = [name for name in expected if not os.path.exists(os.path.join(base, name))]
          if missing:
              print('Missing GUI installers from offline bundle:')
              for name in missing:
                  print(f'  - {name}')
              sys.exit(1)

          print('All expected GUI installers are present in the offline bundle.')
          PYEOF

      - name: Create GitHub Release with offline bundles
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: offline-${{ needs.download-installer-assets.outputs.cli_version }}-oc${{ needs.download-openclaw.outputs.openclaw_version }}
          name: "Windows 离线包 | CLI ${{ needs.download-installer-assets.outputs.cli_version }} + OpenClaw ${{ needs.download-openclaw.outputs.openclaw_version }}"
          body: |
            ## Windows 离线安装包

            本离线包仅面向 Windows x64，**无需联网**即可完成 OpenClaw 安装。

            文件来源分为三部分：

            - 当前仓库的 installer GitHub Release：oclaw、GUI 绿色版、install.ps1
            - openclaw/openclaw 官方 GitHub Release：OpenClaw 主程序包
            - 本工作流运行时生成：离线压缩包与校验和

            ### 📦 包内组件

            | 组件 | 版本 |
            |------|------|
            | oclaw CLI（安装工具）| `${{ needs.download-installer-assets.outputs.cli_version }}` |
            | OpenClaw GUI（图形安装器）| `${{ needs.download-installer-assets.outputs.cli_version }}` |
            | OpenClaw（主程序）| `${{ needs.download-openclaw.outputs.openclaw_version }}` |

            ### 📁 资产来源

            | 内容 | 来源 |
            |------|------|
            | `oclaw-win-x64.exe` | 当前仓库 installer GitHub Release 附件 |
            | `openclaw-gui-*-win32-x64.exe` | 当前仓库 installer GitHub Release 附件 |
            | `${{ needs.download-openclaw.outputs.openclaw_version }}/openclaw-*.zip` | `openclaw/openclaw` 官方 GitHub Release 附件二次打包 |
            | `manifest.json` | 从 CDN 下载，来源于 sync-openclaw 发布结果 |
            | `install.ps1` | 当前仓库 installer GitHub Release 附件 |

            ### 📥 下载说明

            下载以下文件即可：

            | 文件 | 适用平台 |
            |------|----------|
            | `openclaw-offline-bundle-*-win32-x64.zip` | Windows x64 |

            ### 🚀 安装步骤

            每个离线包同时包含：
            - 可直接运行的 `oclaw-win-x64.exe`
            - 可直接运行的 `openclaw-gui-*-win32-x64.exe`
            - 可供 `install.ps1` 使用的一套 OpenClaw Windows 离线包

            **Windows（PowerShell）：**
            ```powershell
            # 解压
            Expand-Archive openclaw-offline-bundle-*-win32-x64.zip .

            # 指定本地离线包目录
            $env:OCLAW_LOCAL_BUNDLE = "$PWD\openclaw-bundle-win32-x64"

            # 使用离线包安装 OpenClaw
            & ".\openclaw-bundle-win32-x64\install.ps1"

            # 或直接运行绿色版工具
            & ".\openclaw-bundle-win32-x64\oclaw-win-x64.exe" --help
            & ".\openclaw-bundle-win32-x64\openclaw-gui-${{ needs.download-installer-assets.outputs.cli_version }}-win32-x64.exe"
            ```

            ### 🔒 校验和

            见附件 `bundle-checksums.sha256`
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            openclaw-offline-bundle-*.zip
            bundle-checksums.sha256
