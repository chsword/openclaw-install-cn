name: Manual Test – macOS CLI pnpm install smoke test

# Manually triggered workflow that validates the current CLI model on macOS:
# environment detection, manifest lookup, and pnpm-based install/upgrade.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

jobs:
  test-macos-cli-pnpm:
    name: macOS CLI – pnpm install smoke test
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install CLI dependencies
        run: npm ci
        working-directory: cli

      - name: Build macOS CLI binary
        run: npm run build:mac-x64
        working-directory: cli

      - name: Install built CLI binary
        env:
          OCLAW_BIN_DIR: ${{ runner.temp }}/oclaw-bin
        run: |
          mkdir -p "$OCLAW_BIN_DIR"
          cp cli/dist/oclaw-darwin-x64 "$OCLAW_BIN_DIR/oclaw"
          chmod +x "$OCLAW_BIN_DIR/oclaw"
          "$OCLAW_BIN_DIR/oclaw" --version

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Check status before install
        env:
          OCLAW_BIN_DIR: ${{ runner.temp }}/oclaw-bin
        run: |
          "$OCLAW_BIN_DIR/oclaw" status --check-updates --json

      - name: Install OpenClaw via pnpm
        env:
          OCLAW_BIN_DIR: ${{ runner.temp }}/oclaw-bin
        run: |
          "$OCLAW_BIN_DIR/oclaw" install

      - name: Verify status after install
        id: status_initial
        env:
          OCLAW_BIN_DIR: ${{ runner.temp }}/oclaw-bin
        run: |
          STATUS_JSON=$("$OCLAW_BIN_DIR/oclaw" status --json 2>&1)
          echo "$STATUS_JSON"
          INSTALLED=$(echo "$STATUS_JSON" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); process.stdout.write(String(JSON.parse(d).installed))")
          INSTALLED_VER=$(echo "$STATUS_JSON" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); process.stdout.write(JSON.parse(d).installedVersion||'')")
          [ "$INSTALLED" = "true" ] || { echo "::error::OpenClaw not installed"; exit 1; }
          [ -n "$INSTALLED_VER" ] || { echo "::error::installedVersion is empty"; exit 1; }
          echo "installed_version=$INSTALLED_VER" >> "$GITHUB_OUTPUT"

      - name: Upgrade OpenClaw via pnpm
        env:
          OCLAW_BIN_DIR: ${{ runner.temp }}/oclaw-bin
        run: |
          "$OCLAW_BIN_DIR/oclaw" upgrade

      - name: Verify status after upgrade
        env:
          OCLAW_BIN_DIR: ${{ runner.temp }}/oclaw-bin
          PRE_UPGRADE_VERSION: ${{ steps.status_initial.outputs.installed_version }}
        run: |
          STATUS_JSON=$("$OCLAW_BIN_DIR/oclaw" status --json 2>&1)
          echo "$STATUS_JSON"
          INSTALLED=$(echo "$STATUS_JSON" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); process.stdout.write(String(JSON.parse(d).installed))")
          INSTALLED_VER=$(echo "$STATUS_JSON" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); process.stdout.write(JSON.parse(d).installedVersion||'')")
          [ "$INSTALLED" = "true" ] || { echo "::error::OpenClaw not installed after upgrade"; exit 1; }
          [ -n "$INSTALLED_VER" ] || { echo "::error::installedVersion is empty after upgrade"; exit 1; }
          echo "Installed version after upgrade: $INSTALLED_VER"
          echo "Previous installed version: $PRE_UPGRADE_VERSION"

      - name: Upload installation log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: manual-test-unix-install-log
          path: |
            /tmp/oclaw-install-*.log
            ${{ runner.temp }}/oclaw-install-*.log
          retention-days: 7
          if-no-files-found: ignore
