<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw 安装助手</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="18" cy="18" r="18" fill="#0066cc"/>
          <path d="M10 24 L18 10 L26 24 Z" fill="white" opacity="0.9"/>
          <circle cx="18" cy="23" r="3" fill="white"/>
        </svg>
        <span class="logo-text">OpenClaw</span>
      </div>
      <span class="header-subtitle">安装助手</span>
    </div>
  </header>

  <!-- Main content -->
  <main class="main">

    <!-- Status card -->
    <section class="card" id="card-status">
      <h2 class="card-title">环境与版本</h2>
      <div class="status-grid">
        <div class="status-row">
          <span class="status-label">当前版本</span>
          <span class="status-value" id="val-installed-version">检查中…</span>
        </div>
        <div class="status-row">
          <span class="status-label">最新版本</span>
          <span class="status-value" id="val-latest-version">–</span>
        </div>
        <div class="status-row">
          <span class="status-label">Node.js</span>
          <span class="status-value" id="val-node-version">–</span>
        </div>
        <div class="status-row">
          <span class="status-label">pnpm</span>
          <span class="status-value" id="val-pnpm-version">–</span>
        </div>
        <div class="status-row">
          <span class="status-label">系统平台</span>
          <span class="status-value" id="val-platform">–</span>
        </div>
      </div>
      <div class="env-hint" id="env-hint">
        GUI 会先检查 Node.js、pnpm 与当前 OpenClaw 版本，再自动完成安装或升级流程。
      </div>
    </section>

    <!-- Action buttons -->
    <section class="actions">
      <button class="btn btn-secondary" id="btn-install-node">安装 Node.js</button>
      <button class="btn btn-secondary" id="btn-install-pnpm">安装 pnpm</button>
      <button class="btn btn-primary" id="btn-install">安装 OpenClaw</button>
      <button class="btn btn-secondary" id="btn-check">检查更新</button>
      <button class="btn btn-ghost" id="btn-settings">查看日志</button>
    </section>

    <!-- Progress area -->
    <section class="card progress-card" id="card-progress" style="display:none">
      <div class="progress-status" id="progress-status">准备中…</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <div class="progress-pct" id="progress-pct">0%</div>
    </section>

    <!-- Logs panel -->
    <section class="card settings-card" id="card-settings" style="display:none">
      <h2 class="card-title">执行日志</h2>
      <div class="log-toolbar">
        <div class="log-filters">
          <label><input type="checkbox" id="filter-info" checked> info</label>
          <label><input type="checkbox" id="filter-warn" checked> warn</label>
          <label><input type="checkbox" id="filter-error" checked> error</label>
        </div>
        <div class="log-actions">
          <button class="btn btn-secondary btn-sm" id="btn-refresh-logs">刷新</button>
          <button class="btn btn-secondary btn-sm" id="btn-export-logs">导出</button>
          <button class="btn btn-ghost btn-sm" id="btn-clear-logs">清空</button>
        </div>
      </div>
      <div class="log-viewer" id="log-viewer">
        <div class="log-empty" id="log-empty">暂无日志</div>
      </div>
      <div class="settings-actions">
        <button class="btn btn-ghost" id="btn-cancel-logs">关闭</button>
      </div>
    </section>

    <!-- Message area -->
    <div class="message-area" id="message-area" style="display:none"></div>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <span>OpenClaw Assistant · 自动检查环境并完成安装</span>
  </footer>

  <script src="bridge.js"></script>
  <script src="app.js"></script>
</body>
</html>
